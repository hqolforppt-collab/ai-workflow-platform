name: Validate Repository OS

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform validation (awp validate)
        run: node packages/awp-cli/bin/awp.js validate

      - name: Blueprint integrity (awp build --check)
        run: node packages/awp-cli/bin/awp.js build --check
