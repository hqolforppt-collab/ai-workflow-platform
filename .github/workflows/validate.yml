name: Validate Repository OS

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform validation (awp validate)
        run: node packages/awp-cli/bin/awp.js validate

      - name: Blueprint integrity (awp build --check)
        run: node packages/awp-cli/bin/awp.js build --check

      - name: Unit tests (governance, CLI, MCP client)
        run: pnpm -r test

      - name: Golden blueprint deterministic validation (17/17)
        run: node packages/awp-cli/bin/awp.js validate examples/workflow-builder/login-registration --story="Create Login and Registration Feature" --level=L6

      - name: Staged aggregation round-trips
        run: |
          node packages/awp-cli/bin/awp.js build --aggregate --out=examples/workflow-builder/login-registration
          git diff --exit-code examples/workflow-builder/login-registration/blueprint.yaml

      - name: Flowable conversion emits artifacts
        run: node packages/awp-cli/bin/awp.js flowable convert examples/workflow-builder/login-registration --out=/tmp/awp-flowable-out
