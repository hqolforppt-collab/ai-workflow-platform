# Golden tests: governance/trace-audit
tests:
  - id: GT-TRACE-001
    name: complete chain passes
    given:
      chain: BR-001 -> FR-001 -> US-001 -> ARCH-001 -> TASK-001 -> MODEL-001 -> GT-001
    expect:
      - verdict: PASS, zero broken links
  - id: GT-TRACE-002
    name: orphaned model fails audit
    given:
      chain: MODEL-002 exists with no task reference
    expect:
      - verdict: FAIL
      - report lists MODEL-002 as orphaned with remediation (link or remove)
