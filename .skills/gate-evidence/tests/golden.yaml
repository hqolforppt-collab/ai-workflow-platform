# Golden tests: governance/gate-evidence
tests:
  - id: GT-GE-001
    name: G1 packet assembled with checklist verdicts
    given:
      gate: G1-requirements
      artifacts: [BR-001, FR-001..003, US-001..002, AC-001..003]
    expect:
      - packet with per-checklist-item verdict (pass/fail/missing)
      - open risks section, never empty-by-default
      - ends with approval request to named human (no agent approval)
  - id: GT-GE-002
    name: missing artifacts surfaced, not hidden
    given:
      gate: G2-architecture with no ADRs present
    expect:
      - packet lists ADRs as MISSING; recommendation = do-not-approve
