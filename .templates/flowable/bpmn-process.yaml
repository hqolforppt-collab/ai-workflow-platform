# Template: Flowable BPMN process (official Flowable field names)
template:
  id: flowable/bpmn-process
  version: 1.0.0
  status: approved
schema:
  process:
    id: string # processDefinitionKey
    name: string
    isExecutable: boolean
    trace:
      tasks: [string] # task spec ids
      functional-requirements: [string]
    elements:
      - id: string
        type: enum [startEvent, endEvent, userTask, serviceTask, scriptTask, exclusiveGateway, parallelGateway, inclusiveGateway, boundaryEvent, subProcess, callActivity]
        name: string
        # userTask fields (Flowable official)
        assignee: string # optional
        candidateGroups: [string] # optional
        formKey: string # optional
        # serviceTask fields
        flowable:class: string # optional
        flowable:delegateExpression: string # optional
    sequenceFlows:
      - id: string
        sourceRef: string
        targetRef: string
        conditionExpression: string # optional, required on gateway outgoing flows > 1
validation:
  - exactly one startEvent; at least one endEvent
  - all sourceRef/targetRef must reference existing element ids
  - field names must match .knowledge/flowable/schemas/bpmn.yaml
  - generation blocked unless G1-G4 approved (Constitution R2)
