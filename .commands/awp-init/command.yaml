command:
  id: awp-init
  version: 1.0.0
  description: One-command bootstrap. Boots the repository OS into production state.
  invocation: "/awp-init"
  steps:
    - verify: .ai/constitution.md exists and frontmatter status == active
    - load: .ai/manifest.yaml (authority chain, component registries)
    - load: .agents/registry.yaml (adopt persona on demand)
    - load: .governance/gates/*.yaml (gate definitions and transitions)
    - hydrate: ".memory/index.yaml (consultation order: failure first)"
    - load: .templates/registry.yaml and .skills/registry.yaml
    - report: system status (agents, skills, templates, gates, memory tiers)
  failure-modes:
    - "missing constitution: REFUSE to operate (Constitution enforcement hook)"
    - "registry conflict with constitution: HALT and escalate to human (G2)"
  output: boot report (markdown) listing loaded components and any conflicts
