id: performance-review
type: functional
version: 1.0.0
pack: hr
triggers:
  - performance-review
  - { term: appraisal, synonyms: [performance evaluation, review cycle, 360 review, rating] }
  - { term: calibration, synonyms: [rating calibration, review calibration, moderation] }
implies: [authorization, audit, notification, privacy]
standards:
  - { id: ISO-27001-A.7, version: "2022", verified: 2026-07-05, url: "https://www.iso.org/standard/27001" }
  - { id: GDPR, version: "2016/679", verified: 2026-07-05, url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj" }
constraints:
  - { id: PERF-C1, rule: "A review cycle has explicit dated stages (self-assessment, manager review, calibration, sign-off); each stage opens/closes on its schedule and locks its inputs once closed" }
  - { id: PERF-C2, rule: "Review content is confidential to the employee, their manager chain, assigned reviewers, and HR; peer feedback is anonymized to the subject where anonymity was promised" }
  - { id: PERF-C3, rule: "Final ratings are only released to the employee after calibration sign-off; draft ratings are never visible to the subject before release" }
  - { id: PERF-C4, rule: "Calibration adjustments to a rating require a recorded justification with the adjuster's id and timestamp; every change is captured in an immutable audit trail" }
  - { id: PERF-C5, rule: "A reviewer cannot review themselves or a direct family/reporting conflict; conflict-of-interest is checked and the assignment rerouted before the cycle opens" }
requirement-seeds:
  - id: discovery/performance-review/REQ-1
    title: Staged review cycle
    ac: "Given an open review cycle, When a stage's deadline passes, Then that stage locks its submissions and the next stage opens for the eligible participants"
  - id: discovery/performance-review/REQ-2
    title: Rating confidentiality
    ac: "Given a draft rating in calibration, When the employee views their review, Then the rating is hidden until calibration is signed off and the result released"
blueprint-sections: [workflows, security, requirements]
review:
  cadence: P12M
  last-reviewed: 2026-07-05
  owner: people-ops-wg
