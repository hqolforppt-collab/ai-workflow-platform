id: password-policy
type: cross-cutting
version: 1.0.0
triggers:
  - password
  - login
  - register
standards:
  - id: NIST 800-63B 5.1.1
    verified: 2026-07-05
constraints:
  - id: PWD-C1
    rule: Min 8 chars, max 64+; all printable unicode allowed; no composition rules
  - id: PWD-C2
    rule: Checked against breached-password list (e.g. HIBP) on set/change
  - id: PWD-C3
    rule: No forced periodic rotation; rotation only on evidence of compromise
  - id: PWD-C4
    rule: "Hashing: argon2id or bcrypt(cost >= 12); per-user salt"
requirement-seeds:
  - id: discovery/password-policy/REQ-1
    title: Breached password rejection
    ac: Given a password found in a breach corpus, When the user sets it, Then it is rejected with guidance
blueprint-sections:
  - security
  - requirements
  - forms
review:
  cadence: P6M
  last-reviewed: 2026-07-05
  owner: platform-wg
