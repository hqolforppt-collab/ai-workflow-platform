  - keyword: order
    prefer: commerce
    unless:
      - approval
      - approve
      - sign-off
  - keyword: document
    prefer: documents
    unless:
      - upload
      - attach
guarantees:
  - additive-only: discovery may add domains/requirements, never remove or alter user intent
  - auth-coverage: any auth-triggered story must activate >= 25 domains (VAL-013)
  - traceability: every discovered item cites discovery/<domain>/<rule-id>
  - closed-graph: every implies/trigger target resolves to a real domain (KB-I1/I2)
