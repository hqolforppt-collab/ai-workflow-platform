project:
  name: Invoice Approval Workflow
  id: BLU-INVOICE-APPROVAL
  blueprint-schema-version: 2.0.0
  maturity-level: L6
  story: "Invoice approval workflow with amount-based routing and four-eyes for large invoices"
  summary: >
    Accounts-payable invoice approval with amount-based routing driven by a DMN
    decision table and mandatory four-eyes (maker != checker) on large invoices.
    The user asked for 2 things (amount-based routing, four-eyes for large
    invoices). Discovery expanded these into 24 domains: the approval mechanics
    (approval-chains, four-eyes, escalation, delegation, sla-management), the
    financial substance the invoices carry (invoicing, tax, payments), and the
    obligations any money-moving enterprise process incurs (SOX/segregation-of-
    duties audit, security, observability, resilience, and operations).
  scope:
    in-scope:
      - Amount-based approval routing via DMN decision DEC-001 (amount, department, vendor-risk -> approver-role, requires-four-eyes)
      - Mandatory four-eyes (distinct maker and checker) for invoices at or above the large-invoice threshold
      - SLA-timed approval stages with automatic escalation to the next authority on timeout
      - Delegation of approval authority (time-boxed, capped, four-eyes-preserving) for approver absence
      - Immutable audit trail, structured logging, metrics, and SLOs for every routing and approval decision
    out-of-scope:
      - Invoice capture / OCR ingestion (invoices arrive already parsed from the AP inbox; see ASM-002)
      - Actual payment disbursement and bank-file generation (handed to the payments service post-approval; see ASM-003)
      - Purchase-order matching and goods-receipt (3-way match handled upstream in procurement; see ASM-004)
      - Vendor master-data onboarding and vendor-risk scoring (consumed as an input, not owned here)
  stakeholders: [ap-controller, cfo, procurement-lead, compliance-officer, sre-lead, internal-audit]
  created: 2026-07-05

