requirements:
  explicit:
    - id: REQ-001
      title: Collect and verify onboarding documents
      description: The new hire submits required documents (ID proof, tax form, signed
        offer letter); each is classified with a retention class and verified
        before the case can progress.
      domain: document-management
      source: user
      priority: must
      acceptance-criteria:
        - Given an open onboarding case, When the new hire uploads a required
          document, Then it is stored with a retention class and a human
          verifier marks it accepted or rejected before the documents-complete
          milestone is reached.
        - Given a required document is still missing 3 business days before the
          start date, When the daily case sweep runs, Then a reminder
          notification (NOT-001) is sent to the new hire and the hiring manager
          is copied.
      depends-on: []
      risks:
        - RSK-001
    - id: REQ-002
      title: Provision equipment as a discretionary case task
      description: A case worker may activate equipment provisioning (laptop, phone,
        peripherals) based on the role; it is optional per hire, not a fixed
        step.
      domain: equipment-provisioning
      source: user
      priority: should
      acceptance-criteria:
        - Given an open onboarding case, When the case worker activates the
          discretionary equipment-provisioning task, Then an equipment order is
          raised against the role's hardware template and tracked to a
          delivery-confirmed state.
        - Given a remote-only hire whose role needs no company hardware, When
          the case worker leaves equipment provisioning un-activated, Then the
          case can still reach onboarding-complete without an equipment order.
      depends-on: []
      risks:
        - RSK-002
    - id: REQ-003
      title: Enroll the new hire in required and role training
      description: Mandatory security and compliance training is assigned on day one;
        role-specific training is a discretionary task the case worker may add.
      domain: training
      source: user
      priority: must
      acceptance-criteria:
        - Given a provisioned new hire on their start date, When day-one setup
          completes, Then mandatory security and compliance training is assigned
          with a completion deadline of 30 days and tracked to completion.
        - Given mandatory training is incomplete after its 30-day deadline, When
          the daily case sweep runs, Then the hiring manager is notified
          (NOT-004) and the case is flagged non-compliant.
      depends-on:
        - REQ-006
      risks:
        - RSK-003
  hidden:
    - id: REQ-010
      title: E-signature on offer letter and policy acknowledgement
      description: The offer letter and policy acknowledgement are signed
        electronically with signer intent, consent, and a tamper-evident
        evidence package.
      domain: e-signature
      source: discovery/e-signature
      priority: must
      acceptance-criteria:
        - Given a signer who has not consented to transact electronically, When
          they attempt to sign the offer letter, Then signing is blocked until
          consent is recorded with a timestamp (ESIGN/UETA).
        - Given a signed policy-acknowledgement document, When any byte of its
          content is altered afterwards, Then signature verification fails and
          the document is flagged invalid (AUD-004 recorded).
      risks:
        - RSK-004
    - id: REQ-011
      title: Retention class and disposition for every collected record
      description: Every collected document carries an explicit retention class and
        disposition date; no record is retained without one.
      domain: retention
      source: discovery/retention
      priority: must
      acceptance-criteria:
        - "Given a document accepted into the case, When it is stored, Then it
          is assigned a retention class (HR records: 6 years after termination)
          and a disposition date, and neither is left blank."
        - Given a stored document past its disposition date, When the scheduled
          disposition job runs, Then it is flagged for destruction behind an
          approval gate rather than being silently auto-purged.
      risks:
        - RSK-005
    - id: REQ-012
      title: Legal hold overrides retention and blocks deletion
      description: An active legal hold on a case record blocks automatic and manual
        deletion regardless of the disposition date.
      domain: legal-hold
      source: discovery/legal-hold
      priority: must
      acceptance-criteria:
        - Given a document under an active legal hold, When its retention period
          expires or a manual delete is attempted, Then deletion is blocked and
          the attempt is logged (AUD-005).
        - Given a legal hold placement request, When it is submitted by a user
          without the hold-admin permission, Then the placement is denied with
          403 and the attempt is audited.
      risks:
        - RSK-005
    - id: REQ-013
      title: Least-privilege access provisioning on start date
      description: Accounts are provisioned from role templates and activate on the
        confirmed start date, not before, with least-privilege by default.
      domain: authorization
      source: discovery/authorization
      priority: must
      acceptance-criteria:
        - Given an approved new hire with a role template, When their confirmed
          start date arrives, Then role-based accounts are provisioned granting
          only the template's permissions, and any admin right requires a
          separate logged approval.
        - Given a hire whose start date has not yet arrived, When provisioning
          is attempted early, Then the accounts are created disabled and remain
          inactive until the start date to avoid an open credential window.
      risks:
        - RSK-006
    - id: REQ-014
      title: Complete audit trail for every case event
      description: Every provisioning, document, signature, and milestone event writes
        an immutable audit entry with actor, target, timestamp, and reference.
      domain: audit
      source: discovery/audit
      priority: must
      acceptance-criteria:
        - Given any event in the audit.events catalog, When it occurs, Then an
          append-only audit record exists within 5 seconds carrying actor id,
          target employee id, ISO-8601 timestamp, and the source approval
          reference.
      risks:
        - RSK-007
    - id: REQ-015
      title: Case milestones and human decision points
      description: The case tracks named milestones and pauses at human decision
        points (readiness review) rather than running one fixed path.
      domain: case-management
      source: discovery/case-management
      priority: must
      acceptance-criteria:
        - Given an onboarding case, When all required documents are accepted and
          day-one access is provisioned, Then the day-one-ready milestone is
          marked and a readiness review decision is presented to the hiring
          manager.
        - Given the hiring manager reviews readiness, When they decide the hire
          is not ready, Then the case returns to an active state with the
          blocking task re-opened rather than closing.
      risks:
        - RSK-008
    - id: REQ-016
      title: Badge issuance as a discretionary task
      description: Physical or virtual badge issuance is an optional case task
        activated when site access is needed.
      domain: identity-management
      source: discovery/identity-management
      priority: should
      acceptance-criteria:
        - Given an on-site hire, When the case worker activates the
          discretionary badge-issuance task, Then a badge is issued against the
          site's access profile and its activation is recorded in the audit
          trail.
        - Given a fully-remote hire, When no site access is required, Then badge
          issuance stays un-activated and does not block the onboarding-complete
          milestone.
      risks:
        - RSK-006
    - id: REQ-017
      title: Checklist completion gate before case closure
      description: The onboarding case cannot close until its required checklist
        (documents, access, training) reaches 100%.
      domain: onboarding
      source: discovery/onboarding
      priority: must
      acceptance-criteria:
        - Given an onboarding case with any required checklist item incomplete,
          When closure is attempted, Then closure is blocked and the incomplete
          items are listed.
        - Given an onboarding case whose required items are all complete, When
          the hiring manager confirms closure, Then the onboarding-complete
          milestone is marked and the case moves to a closed state.
      risks:
        - RSK-008
    - id: REQ-018
      title: Onboarding observability — metrics, alerts, SLOs
      description: Case health (time-to-ready, stuck cases, provisioning latency) is
        measurable and alertable.
      domain: monitoring
      source: discovery/monitoring
      priority: must
      acceptance-criteria:
        - Given the production environment, When the median
          time-to-day-one-ready exceeds its SLO over a 7-day window, Then alert
          ALT-001 fires to the people-ops channel with runbook RB-001 linked.
      risks:
        - RSK-007
    - id: REQ-019
      title: GDPR-compliant handling of new-hire personal data
      description: New-hire PII (name, national ID, home address) is inventoried,
        consent-captured, and subject to erasure within SLA when no legal basis
        to retain applies.
      domain: privacy
      source: discovery/privacy
      priority: must
      acceptance-criteria:
        - Given a valid erasure request for a withdrawn candidate with no
          overriding legal basis, When 30 days pass, Then the personal data is
          irreversibly purged from primary store and backups and the outcome is
          recorded.
      risks:
        - RSK-005
risks:
  - id: RSK-001
    description: New hire misses start date because required documents arrive late
    category: operational
    likelihood: high
    impact: medium
    mitigation: 3-day-out reminders (REQ-001) + manager escalation + readiness
      review before start
    owner: people-ops-lead
  - id: RSK-002
    description: Equipment ordered for a role that does not need it, wasting spend
    category: operational
    likelihood: medium
    impact: low
    mitigation: equipment kept discretionary (REQ-002); role hardware templates
      reviewed quarterly
    owner: it-provisioning-lead
  - id: RSK-003
    description: Mandatory compliance training not completed, creating audit exposure
    category: compliance
    likelihood: medium
    impact: high
    mitigation: day-one assignment + 30-day deadline + non-compliance flag (REQ-003,
      RB-003)
    owner: security-officer
  - id: RSK-004
    description: Disputed signature on offer letter due to weak signer-intent capture
    category: compliance
    likelihood: low
    impact: high
    mitigation: consent-before-signing + RFC 3161 timestamp + tamper-evident
      evidence (REQ-010)
    owner: data-protection-officer
  - id: RSK-005
    description: Personal data retained past its lawful basis or purged while under hold
    category: compliance
    likelihood: medium
    impact: critical
    mitigation: retention classes + legal-hold override + defensible deletion
      (REQ-011, REQ-012, REQ-019, RB-004)
    owner: data-protection-officer
  - id: RSK-006
    description: Access provisioned early creating an open unused-credential window
    category: security
    likelihood: medium
    impact: high
    mitigation: start-date activation + accounts-created-disabled + least-privilege
      (REQ-013)
    owner: security-officer
  - id: RSK-007
    description: Audit or monitoring gaps discovered during a SOC2 audit
    category: compliance
    likelihood: low
    impact: critical
    mitigation: audit event catalog reviewed at G4; quarterly evidence dry-run
      (REQ-014, REQ-018)
    owner: security-officer
  - id: RSK-008
    description: Case closed while a required checklist item is still incomplete
    category: operational
    likelihood: low
    impact: medium
    mitigation: 100% checklist gate + human readiness review before closure
      (REQ-015, REQ-017)
    owner: people-ops-lead
assumptions:
  - id: ASM-001
    statement: Approved new hires enter this system from an upstream ATS with a
      confirmed start date
    impact-if-wrong: case creation needs its own hire-approval sub-flow and
      start-date negotiation
    validation-needed: Confirm the ATS integration and that start dates are firm at hand-off.
  - id: ASM-002
    statement: GDPR applies (EU-based hires are in scope)
    impact-if-wrong: consent capture and erasure flows could be simplified;
      retention values change
    validation-needed: Confirm which jurisdictions new hires are employed in with legal.
  - id: ASM-003
    statement: Payroll calculation is handled downstream; onboarding only hands off
      enrollment data
    impact-if-wrong: payroll enrollment, banking capture, and tax filing become
      in-scope case tasks
    validation-needed: Confirm the payroll boundary with finance.
  - id: ASM-004
    statement: Offboarding is a separate case type and out of scope here
    impact-if-wrong: a shared case model spanning the full employment lifecycle is needed
    validation-needed: Confirm with people-ops whether one case model should cover both.
  - id: ASM-005
    statement: Peak onboarding load is 50 concurrent open cases (seasonal hiring waves)
    impact-if-wrong: capacity plan and case-worker staffing need retuning
    validation-needed: Validate against the annual hiring-volume forecast.
  - id: ASM-006
    statement: HR records retention of 6 years after termination satisfies
      applicable jurisdictions
    impact-if-wrong: retention classes and storage cost change; possible legal exposure
    validation-needed: Confirm the records-retention schedule with legal/compliance.
actors:
  - id: ACT-001
    name: New Hire
    type: human
    description: The incoming employee who submits documents, signs the offer letter
      and policies, and completes training.
    goals:
      - complete onboarding before the start date
      - sign required documents
      - be productive on day one
    interactions:
      - WF-001
      - WF-002
      - WF-003
  - id: ACT-002
    name: Onboarding Case Worker
    type: human
    description: People-ops owner of the case who activates discretionary tasks and
      drives the case to closure.
    goals:
      - open and steer the case
      - activate the right optional tasks per hire
      - close only when complete
    interactions:
      - WF-001
      - WF-002
      - WF-003
  - id: ACT-003
    name: Hiring Manager
    type: human
    description: The new hire's manager who makes the readiness-review decision and
      confirms case closure.
    goals:
      - confirm the hire is day-one ready
      - approve any elevated access
      - sign off closure
    interactions:
      - WF-002
      - WF-003
  - id: ACT-004
    name: IT Provisioning Service
    type: service
    description: Backend service that creates accounts from role templates, orders
      equipment, and issues badges.
    goals:
      - provision least-privilege access on the start date
      - fulfil equipment and badge tasks
    interactions:
      - WF-001
      - WF-002
      - WF-003
  - id: ACT-005
    name: E-Signature Provider
    type: system
    description: External e-signature service capturing signer intent, consent, and
      a tamper-evident evidence package.
    goals:
      - collect legally valid signatures
      - return a verifiable evidence package
    interactions:
      - WF-001
  - id: ACT-006
    name: Records Janitor
    type: scheduler
    description: Scheduled job that sweeps cases for reminders and flags documents
      past their disposition date for approval-gated destruction.
    goals:
      - drive reminders and deadlines
      - enforce retention without silent auto-purge
    interactions:
      - WF-002
      - WF-003
roles:
  - id: ROLE-NEW-HIRE
    name: New Hire
    permissions:
      - case:read-own
      - document:upload-own
      - document:sign-own
      - training:complete-own
    assigned-actors:
      - ACT-001
  - id: ROLE-CASE-WORKER
    name: Onboarding Case Worker
    permissions:
      - case:create
      - case:read
      - task:activate-discretionary
      - document:verify
      - case:close-request
    assigned-actors:
      - ACT-002
  - id: ROLE-HIRING-MANAGER
    name: Hiring Manager
    permissions:
      - case:read
      - readiness:decide
      - access:approve-elevated
      - case:close-confirm
    assigned-actors:
      - ACT-003
  - id: ROLE-HOLD-ADMIN
    name: Legal Hold Administrator
    permissions:
      - hold:place
      - hold:release
      - audit:read
    assigned-actors: []
    separation-of-duties:
      - ROLE-CASE-WORKER
data-model:
  entities:
    - id: ENT-OnboardingCase
      name: OnboardingCase
      description: The case record tracking one new hire's onboarding state,
        milestones, and task plan.
      attributes:
        - name: id
          type: uuid
          required: true
          pii: false
          unique: true
          default: gen_random_uuid()
          validation: uuidv4
        - name: employee_name
          type: text
          required: true
          pii: true
          unique: false
          default: null
          validation: max 200 chars
        - name: national_id
          type: text
          required: true
          pii: true
          unique: false
          default: null
          validation: encrypted at rest; format per jurisdiction
        - name: start_date
          type: date
          required: true
          pii: false
          unique: false
          default: null
          validation: not in the past at case creation
        - name: state
          type: enum
          required: true
          pii: false
          unique: false
          default: OPEN
          validation: one of master-data:case-state
        - name: role_template
          type: text
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:role-template
        - name: created_at
          type: timestamptz
          required: true
          pii: false
          unique: false
          default: now()
          validation: not in future
      relationships:
        - target: ENT-Document
          cardinality: 1-n
          on-delete: restrict
        - target: ENT-CaseTask
          cardinality: 1-n
          on-delete: cascade
        - target: ENT-Milestone
          cardinality: 1-n
          on-delete: cascade
      retention: 6 years after termination (HR records class); erased earlier only for
        withdrawn candidates with no legal basis
      classification: restricted
    - id: ENT-Document
      name: Document
      description: A collected onboarding document with retention class, verification
        state, and optional signature evidence.
      attributes:
        - name: id
          type: uuid
          required: true
          pii: false
          unique: true
          default: gen_random_uuid()
          validation: uuidv4
        - name: case_id
          type: uuid
          required: true
          pii: false
          unique: false
          default: null
          validation: fk ENT-OnboardingCase
        - name: kind
          type: enum
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:document-kind
        - name: content_hash
          type: text
          required: true
          pii: false
          unique: false
          default: null
          validation: sha256 of exact document bytes
        - name: retention_class
          type: enum
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:retention-class
        - name: disposition_date
          type: date
          required: true
          pii: false
          unique: false
          default: null
          validation: computed from retention class; never blank
        - name: legal_hold
          type: bool
          required: true
          pii: false
          unique: false
          default: false
          validation: true blocks deletion (REQ-012)
        - name: verified_at
          type: timestamptz
          required: false
          pii: false
          unique: false
          default: null
          validation: set when a verifier accepts
      relationships:
        - target: ENT-SignatureEvidence
          cardinality: 1-1
          on-delete: cascade
      retention: per retention_class; deletion blocked while legal_hold = true
      classification: restricted
    - id: ENT-CaseTask
      name: CaseTask
      description: A required or discretionary task within the case (document
        collection, provisioning, equipment, badge, training).
      attributes:
        - name: id
          type: uuid
          required: true
          pii: false
          unique: true
          default: gen_random_uuid()
          validation: uuidv4
        - name: case_id
          type: uuid
          required: true
          pii: false
          unique: false
          default: null
          validation: fk ENT-OnboardingCase
        - name: kind
          type: enum
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:task-kind
        - name: required
          type: bool
          required: true
          pii: false
          unique: false
          default: true
          validation: false = discretionary (case-worker activated)
        - name: state
          type: enum
          required: true
          pii: false
          unique: false
          default: AVAILABLE
          validation: one of master-data:task-state
        - name: activated_by
          type: uuid
          required: false
          pii: false
          unique: false
          default: null
          validation: actor who activated a discretionary task
      relationships: []
      retention: with parent case (6 years after termination)
      classification: confidential
    - id: ENT-SignatureEvidence
      name: SignatureEvidence
      description: Tamper-evident evidence package for an e-signed document (signer,
        consent, timestamp, method).
      attributes:
        - name: id
          type: uuid
          required: true
          pii: false
          unique: true
          default: gen_random_uuid()
          validation: uuidv4
        - name: document_id
          type: uuid
          required: true
          pii: false
          unique: true
          default: null
          validation: fk ENT-Document
        - name: signer_ip
          type: inet
          required: true
          pii: true
          unique: false
          default: null
          validation: valid IPv4/IPv6
        - name: consent_at
          type: timestamptz
          required: true
          pii: false
          unique: false
          default: null
          validation: consent recorded before signing (ESIGN/UETA)
        - name: signed_at
          type: timestamptz
          required: true
          pii: false
          unique: false
          default: null
          validation: RFC 3161 trusted timestamp
        - name: method
          type: enum
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:signature-method
      relationships: []
      retention: with the signed document; independently verifiable offline
      classification: restricted
    - id: ENT-Milestone
      name: Milestone
      description: A named case milestone reached during onboarding.
      attributes:
        - name: id
          type: uuid
          required: true
          pii: false
          unique: true
          default: gen_random_uuid()
          validation: uuidv4
        - name: case_id
          type: uuid
          required: true
          pii: false
          unique: false
          default: null
          validation: fk ENT-OnboardingCase
        - name: name
          type: enum
          required: true
          pii: false
          unique: false
          default: null
          validation: one of master-data:milestone
        - name: reached_at
          type: timestamptz
          required: false
          pii: false
          unique: false
          default: null
          validation: set when the milestone condition is met
      relationships: []
      retention: with parent case
      classification: confidential
master-data:
  - name: case-state
    values:
      - OPEN
      - ACTIVE
      - AWAITING_REVIEW
      - CLOSED
      - CANCELLED
    owner: people-ops-wg
    change-process: ADR + migration + G3 review
  - name: task-kind
    values:
      - DOCUMENT_COLLECTION
      - POLICY_ESIGN
      - ACCESS_PROVISIONING
      - EQUIPMENT_PROVISIONING
      - BADGE_ISSUANCE
      - TRAINING_ENROLLMENT
    owner: people-ops-wg
    change-process: ADR + migration + G3 review
  - name: task-state
    values:
      - AVAILABLE
      - ACTIVE
      - COMPLETED
      - SKIPPED
    owner: people-ops-wg
    change-process: ADR + migration + G3 review
  - name: document-kind
    values:
      - ID_PROOF
      - TAX_FORM
      - OFFER_LETTER
      - POLICY_ACK
    owner: people-ops-wg
    change-process: ADR + migration + G3 review
  - name: retention-class
    values:
      - HR_RECORD_6Y
      - SIGNED_CONTRACT_10Y
      - TRANSIENT_1Y
    owner: records-management-wg
    change-process: records-schedule PR + legal review
  - name: signature-method
    values:
      - SIMPLE_ESIGN
      - ADVANCED_ESIGN
      - QUALIFIED_ESIGN
    owner: platform-wg
    change-process: ADR + legal review (eIDAS assurance level)
  - name: milestone
    values:
      - RECORD_OPENED
      - DOCUMENTS_COMPLETE
      - DAY_ONE_READY
      - ONBOARDING_COMPLETE
    owner: people-ops-wg
    change-process: ADR + G3 review
knowledge:
  glossary:
    - term: discretionary task
      definition: An optional case task a case worker may activate on judgement
        (equipment, badge, role training); its absence never blocks case
        completion.
    - term: required task
      definition: A case task that must reach completion for the checklist gate to
        pass (document collection, policy e-sign, day-one access provisioning).
    - term: milestone
      definition: A named case state reached when its condition is met; onboarding
        tracks record-opened, documents-complete, day-one-ready, and
        onboarding-complete.
    - term: legal hold
      definition: An override that blocks deletion of a record while active,
        regardless of its retention disposition date.
    - term: evidence package
      definition: A tamper-evident bundle proving who signed a document, when, from
        where, and how — independently verifiable offline.
  domain-concepts:
    - case-management (CMMN)
    - least-privilege provisioning
    - defensible deletion
    - non-repudiation
    - segregation of duties
  references:
    - OMG CMMN 1.1 (case management model)
    - SOC2 CC6 (logical access)
    - ISO 27001 A.7 (human resource security)
    - eIDAS 910/2014 + ESIGN Act (e-signature)
    - GDPR Art. 5/17 (retention & erasure)
    - ISO 15489 (records management)
workflows:
  root:
    id: WF-001
    name: Employee Onboarding Case
    model-type: cmmn
    trigger: Case worker opens an onboarding case for an approved new hire (FRM-001)
    actors:
      - ACT-001
      - ACT-002
      - ACT-003
      - ACT-004
      - ACT-005
    requirements:
      - REQ-001
      - REQ-010
      - REQ-011
      - REQ-013
      - REQ-015
      - REQ-016
      - REQ-017
      - REQ-014
      - REQ-018
    steps:
      - id: S1
        name: Open case + build task plan
        type: system-action
        actor: ACT-002
        task-nature: required
        inputs:
          - new-hire
          - role-template
        outputs:
          - case-id
          - task-plan
        on-success: S2
        on-failure: EX-001 (invalid hire data — case not opened; return to ATS)
        audit-event: AUD-001
      - id: S2
        name: Collect required documents
        type: user-action
        actor: ACT-001
        task-nature: required
        inputs:
          - id-proof
          - tax-form
        outputs:
          - uploaded-docs
        on-success: S3
        on-failure: EX-002 (missing docs 3-days-out -> NOT-001 reminder; case waits)
      - id: S3
        name: E-sign offer + policy ack
        type: user-action
        actor: ACT-001
        task-nature: required
        inputs:
          - offer-letter
          - policy-doc
          - consent
        outputs:
          - signature-evidence
        on-success: S7
        on-failure: EX-003 (consent not given -> signing blocked until recorded)
        audit-event: AUD-004
      - id: S4
        name: Provision equipment
        type: user-action
        actor: ACT-002
        task-nature: discretionary
        inputs:
          - role-template
        outputs:
          - equipment-order
        on-success: S9
        on-failure: EX-004 (order failed -> retry; task stays active, never blocks close)
      - id: S5
        name: Issue badge
        type: user-action
        actor: ACT-002
        task-nature: discretionary
        inputs:
          - site-access-profile
        outputs:
          - badge-id
        on-success: S9
        on-failure: EX-005 (badge system down -> retry queue; discretionary, non-blocking)
      - id: S6
        name: Enroll in role training
        type: user-action
        actor: ACT-002
        task-nature: discretionary
        inputs:
          - role-curriculum
        outputs:
          - enrollment
        on-success: S9
        on-failure: EX-006 (LMS enroll failed -> retry; discretionary, non-blocking)
      - id: S7
        name: Provision day-one access
        type: system-action
        actor: ACT-004
        task-nature: required
        inputs:
          - role-template
          - start-date
        outputs:
          - accounts-active
        on-success: S8
        on-failure: EX-007 (provisioning failure -> accounts stay disabled; page IT;
          ALT-002)
        audit-event: AUD-002
      - id: S8
        name: Readiness review decision
        type: decision
        actor: ACT-003
        task-nature: required
        inputs:
          - checklist-state
        outputs:
          - ready-verdict
        on-success: S9
        on-failure: EX-008 (not ready -> re-open blocking task; case returns to ACTIVE)
        audit-event: AUD-006
      - id: S9
        name: Close case at 100% checklist
        type: system-action
        actor: ACT-002
        task-nature: required
        inputs:
          - checklist-state
        outputs:
          - case-closed
        on-success: END
        on-failure: EX-009 (checklist < 100% -> closure blocked; incomplete items listed)
        audit-event: AUD-007
    exceptions:
      - id: EX-001
        condition: invalid or incomplete hire data at case open
        handling: case not created; discrepancy returned to the ATS hand-off; nothing
          provisioned
        notification: null
      - id: EX-002
        condition: required document missing near start date
        handling: case waits in ACTIVE; NOT-001 reminder to hire, manager copied;
          surfaced in readiness review
        notification: NOT-001
      - id: EX-003
        condition: signer has not consented to transact electronically
        handling: signing blocked until consent recorded with timestamp (ESIGN/UETA); no
          evidence package produced
        notification: null
      - id: EX-004
        condition: equipment order rejected or undeliverable
        handling: discretionary task retried; stays ACTIVE; never blocks
          onboarding-complete
        notification: NOT-002
      - id: EX-005
        condition: badge system unavailable
        handling: badge request queued and retried; discretionary, non-blocking
        notification: null
      - id: EX-006
        condition: training LMS enrollment failure
        handling: retry with backoff; discretionary role training never blocks close
        notification: null
      - id: EX-007
        condition: day-one access provisioning failure
        handling: accounts remain disabled (no open credential window); IT paged via
          ALT-002; retried
        notification: NOT-003
      - id: EX-008
        condition: hiring manager marks hire not ready
        handling: case returns to ACTIVE; blocking task re-opened; readiness review
          re-presented later
        notification: NOT-002
      - id: EX-009
        condition: closure attempted below 100% required checklist
        handling: closure blocked; incomplete required items listed to the case worker
        notification: null
    sla: "case open -> day-one-ready milestone: by the confirmed start date (100% of
      hires)"
  dependent:
    - id: WF-002
      name: Document Verification and Retention
      trigger: A document is uploaded to the case (API-002)
      actors:
        - ACT-001
        - ACT-002
        - ACT-006
      requirements:
        - REQ-001
        - REQ-011
        - REQ-012
        - REQ-019
      steps:
        - id: S1
          name: Malware + format scan
          type: system-action
          actor: ACT-004
          inputs:
            - uploaded-file
          outputs:
            - scan-verdict
          on-success: S2
          on-failure: EX-101 (failed scan -> 400; document rejected, hire asked to
            re-upload)
        - id: S2
          name: Assign retention class
          type: system-action
          actor: ACT-004
          inputs:
            - document-kind
          outputs:
            - retention-class
            - disposition-date
          on-success: S3
          on-failure: EX-102 (unclassifiable kind -> hold in TRANSIENT_1Y pending records
            review)
        - id: S3
          name: Human verification
          type: user-action
          actor: ACT-002
          inputs:
            - document
          outputs:
            - verify-verdict
          on-success: S4
          on-failure: EX-103 (rejected -> NOT-001 asks hire to resubmit; case waits)
          audit-event: AUD-003
        - id: S4
          name: Evaluate disposition/hold
          type: decision
          actor: ACT-006
          inputs:
            - disposition-date
            - legal-hold
          outputs:
            - disposition-action
          on-success: END
          on-failure: EX-104 (hold active -> deletion blocked; AUD-005; never auto-purged)
          audit-event: AUD-005
      exceptions:
        - id: EX-101
          condition: malware or invalid format
          handling: 400; document rejected; hire prompted to re-upload; nothing stored
          notification: null
        - id: EX-102
          condition: document kind not classifiable
          handling: stored as TRANSIENT_1Y and queued for records review; never left
            without a class
          notification: NOT-005
        - id: EX-103
          condition: verifier rejects the document
          handling: document marked rejected; NOT-001 to hire; readiness review surfaces
            the gap
          notification: NOT-001
        - id: EX-104
          condition: disposition due but legal hold active
          handling: deletion blocked; attempt logged (AUD-005); document retained until
            hold released
          notification: null
      sla: "upload -> verification decision: 1 business day (p95)"
    - id: WF-003
      name: Day-One Access Provisioning
      trigger: Confirmed start date reached for an open case (timer)
      actors:
        - ACT-003
        - ACT-004
      requirements:
        - REQ-013
        - REQ-014
        - REQ-003
      steps:
        - id: S1
          name: Resolve role template
          type: system-action
          actor: ACT-004
          inputs:
            - role-template
          outputs:
            - permission-set
          on-success: S2
          on-failure: EX-201 (unknown template -> block; page IT; no default-allow)
        - id: S2
          name: Create accounts (disabled)
          type: system-action
          actor: ACT-004
          inputs:
            - permission-set
          outputs:
            - accounts
          on-success: S3
          on-failure: EX-202 (create failure -> retry; nothing partially enabled)
        - id: S3
          name: Activate on start date
          type: timer
          actor: ACT-004
          inputs:
            - start-date
          outputs:
            - accounts-active
          on-success: S4
          on-failure: EX-203 (activation before start date -> refused; window kept closed)
          audit-event: AUD-002
        - id: S4
          name: Assign mandatory training
          type: system-action
          actor: ACT-004
          inputs:
            - security-curriculum
          outputs:
            - training-assigned
          on-success: END
          on-failure: EX-204 (LMS down -> retry; deadline clock starts on assignment)
      exceptions:
        - id: EX-201
          condition: role template unresolved
          handling: provisioning blocked; IT paged (ALT-002); no fallback broad grant
          notification: NOT-003
        - id: EX-202
          condition: account create failure
          handling: retry with backoff; no partially-enabled account persisted
          notification: null
        - id: EX-203
          condition: activation attempted before start date
          handling: refused; accounts stay disabled to avoid an open credential window
          notification: null
        - id: EX-204
          condition: training LMS unavailable
          handling: retry; 30-day deadline begins at successful assignment; manager
            notified on miss (NOT-004)
          notification: NOT-004
      sla: "start date reached -> accounts active: within 1 business day"
security:
  authentication:
    methods:
      - sso-oidc
    password-policy:
      min-length: 12
      complexity: delegated to corporate IdP (SSO); local passwords not stored by this
        system
      history: 0
      max-age-days: 0
    mfa:
      required: true
      methods:
        - totp
        - webauthn
      enrollment: enforced by the corporate IdP at first sign-in; case workers and
        hold admins require WebAuthn
    session:
      storage: OIDC access token (memory) + refresh token in HttpOnly Secure
        SameSite=Lax cookie
      ttl-minutes: 15
      idle-timeout-minutes: 60
      refresh-strategy: rotate-on-use; replay revokes the session
      revocation: server-side session table; sign-out-everywhere supported
    account-lockout:
      threshold: 5
      window-minutes: 15
      lockout-minutes: 30
      notification: NOT-003
    rate-limiting:
      scope: per-user and per-IP on case-mutation and document-upload endpoints
      limit: 60
      window: 1m
      response: 429 + Retry-After header
  authorization:
    model: rbac
    enforcement-points:
      - api-gateway
      - case-service-middleware
  data-protection:
    encryption-at-rest: AES-256 (managed Postgres + object store); national_id
      column-encrypted with a KMS key
    encryption-in-transit: TLS 1.3 only; HSTS max-age=63072000
    secrets-management: platform secret store; e-signature and provisioning API keys
      rotated every 90 days
  threat-controls:
    - threat: Privilege creep at hire
      mitigation: least-privilege role templates; elevated access needs a separate
        logged approval (REQ-013)
      owner: security-officer
    - threat: Early access window
      mitigation: accounts created disabled; activation gated on confirmed start date
      owner: security-officer
    - threat: Tampered signed document
      mitigation: SHA-256 content binding + tamper-evident evidence package (REQ-010)
      owner: data-protection-officer
    - threat: Unauthorized legal-hold release
      mitigation: hold place/release restricted to ROLE-HOLD-ADMIN with
        separation-of-duties + audit (REQ-012)
      owner: data-protection-officer
api:
  - id: API-001
    method: POST
    path: /cases
    description: Open an onboarding case for an approved new hire and build the
      required/discretionary task plan.
    auth-required: true
    roles:
      - ROLE-CASE-WORKER
    request:
      content-type: application/json
      schema: "{employeeName, nationalId, startDate, roleTemplate}"
      validation: FRM-001 rules server-side; startDate not in the past; roleTemplate known
    responses:
      - status: 201
        condition: case opened with task plan
        schema: "{caseId, tasks[]}"
      - status: 400
        condition: invalid hire data or unknown role template
        schema: "{errors[]}"
      - status: 409
        condition: an open case already exists for this hire
        schema: "{message, caseId}"
    rate-limit: 30/min per case worker
    idempotency: idempotency key = ATS hire id; duplicate opens return the existing
      case (409)
    errors:
      - ERR-VALIDATION
      - ERR-DUPLICATE-CASE
  - id: API-002
    method: POST
    path: /cases/{id}/documents
    description: Upload an onboarding document; stored with a retention class and
      pending verification.
    auth-required: true
    roles:
      - ROLE-NEW-HIRE
      - ROLE-CASE-WORKER
    request:
      content-type: multipart/form-data
      schema: "{kind, file}"
      validation: kind in document-kind; file scanned; content_hash computed;
        retention_class assigned
    responses:
      - status: 202
        condition: document accepted and queued for verification
        schema: "{documentId, retentionClass, dispositionDate}"
      - status: 400
        condition: unknown kind, oversized, or failed malware scan
        schema: "{errors[]}"
      - status: 429
        condition: rate limited
        schema: "{message, retryAfter}"
    rate-limit: 60/min per user
    idempotency: re-upload of identical content_hash for the same kind returns the
      existing document
    errors:
      - ERR-VALIDATION
      - ERR-RATE-LIMITED
  - id: API-003
    method: POST
    path: /cases/{id}/tasks/{taskId}/activate
    description: Activate a discretionary task (equipment, badge, or role training)
      on the case.
    auth-required: true
    roles:
      - ROLE-CASE-WORKER
    request:
      content-type: application/json
      schema: "{}"
      validation: task must be discretionary and in AVAILABLE state
    responses:
      - status: 200
        condition: discretionary task moved to ACTIVE
        schema: "{taskId, state}"
      - status: 403
        condition: task is required (not activatable) or caller lacks permission
        schema: "{message}"
      - status: 409
        condition: task already active or completed
        schema: "{message, state}"
    rate-limit: 60/min per case worker
    idempotency: activating an already-ACTIVE task returns 409 (no double activation)
    errors:
      - ERR-FORBIDDEN
      - ERR-CONFLICT
  - id: API-004
    method: POST
    path: /cases/{id}/close
    description: Request case closure; succeeds only when the required checklist is
      100% complete and readiness is approved.
    auth-required: true
    roles:
      - ROLE-CASE-WORKER
      - ROLE-HIRING-MANAGER
    request:
      content-type: application/json
      schema: "{confirm: true}"
      validation: checklist gate evaluated server-side; readiness decision must be APPROVED
    responses:
      - status: 200
        condition: case closed; onboarding-complete milestone marked
        schema: "{caseId, state, milestone}"
      - status: 409
        condition: required checklist below 100% or readiness not approved
        schema: "{incompleteItems[]}"
    rate-limit: 30/min per user
    idempotency: closing an already-CLOSED case returns 200 with the existing closure record
    errors:
      - ERR-CHECKLIST-INCOMPLETE
  - id: API-005
    method: POST
    path: /documents/{id}/hold
    description: Place or release a legal hold on a document; blocks deletion while active.
    auth-required: true
    roles:
      - ROLE-HOLD-ADMIN
    request:
      content-type: application/json
      schema: "{action: place|release, reason}"
      validation: caller must hold hold-admin permission; reason required
    responses:
      - status: 200
        condition: hold placed or released; audit recorded
        schema: "{documentId, legalHold}"
      - status: 403
        condition: caller lacks the hold-admin permission
        schema: "{message}"
    rate-limit: 20/min per admin
    idempotency: placing an existing hold or releasing an absent hold is a no-op
      returning 200
    errors:
      - ERR-FORBIDDEN
events:
  - id: EVT-onboarding.case.opened
    name: onboarding.case.opened
    producer: case-service
    consumers:
      - analytics-pipeline
      - it-provisioning
    payload:
      case-id: uuid
      role-template: string
      start-date: date
    delivery: at-least-once
    pii-in-payload: false
  - id: EVT-onboarding.milestone.reached
    name: onboarding.milestone.reached
    producer: case-service
    consumers:
      - analytics-pipeline
      - people-ops-dashboard
    payload:
      case-id: uuid
      milestone: string
      reached-at: timestamp
    delivery: at-least-once
    pii-in-payload: false
  - id: EVT-onboarding.document.signed
    name: onboarding.document.signed
    producer: case-service
    consumers:
      - records-archive
      - siem
    payload:
      case-id: uuid
      document-id: uuid
      method: string
      signed-at: timestamp
    delivery: at-least-once
    pii-in-payload: false
  - id: EVT-onboarding.access.provisioned
    name: onboarding.access.provisioned
    producer: it-provisioning
    consumers:
      - siem
      - people-ops-dashboard
    payload:
      case-id: uuid
      role-template: string
      provisioned-at: timestamp
    delivery: at-least-once
    pii-in-payload: false
integrations:
  - id: INT-001
    system: E-signature provider (eIDAS/ESIGN)
    purpose: capture legally valid signatures on offer letter and policy
      acknowledgement (REQ-010)
    protocol: HTTPS REST + webhooks for completion + evidence-package download
    direction: outbound
    auth: API key in secret store, 90-day rotation
    failure-mode: signing task stays ACTIVE; retried; case never closes without
      required signatures
    data-shared:
      - signer-email
      - document-hash
      - consent-record
      - callback-url
  - id: INT-002
    system: IT provisioning (IdP + MDM + LMS)
    purpose: create role-template accounts, order equipment, enroll training
    protocol: HTTPS REST + SCIM for identity
    direction: bidirectional
    auth: OAuth2 client credentials in secret store
    failure-mode: provisioning failure keeps accounts disabled and pages IT
      (ALT-002); no partial elevated access
    data-shared:
      - employee-id
      - role-template
      - equipment-sku
      - curriculum-id
  - id: INT-003
    system: Records archive + retention engine
    purpose: apply retention classes, run disposition, enforce legal hold (REQ-011,
      REQ-012)
    protocol: HTTPS REST
    direction: outbound
    auth: API key in secret store
    failure-mode: documents retained (fail-safe) if disposition service is down;
      nothing auto-purged; ALT-003
    data-shared:
      - document-id
      - retention-class
      - disposition-date
      - hold-state
decision-tables:
  - id: DEC-001
    name: Document Disposition Decision
    hit-policy: FIRST
    trace:
      requirement: REQ-012
      invoked-by: WF-002.S4
    inputs:
      - id: input1
        label: Legal hold active
        expression: legal_hold
        type: boolean
      - id: input2
        label: Past disposition date
        expression: past_disposition
        type: boolean
      - id: input3
        label: Retention class
        expression: retention_class
        type: string
    outputs:
      - id: output1
        label: Action
        name: action
        type: string
    rules:
      - when: legal_hold = true
        then: block-deletion-and-log
      - when: past_disposition = true
        then: flag-for-approval-gate
      - when: retention_class = 'TRANSIENT_1Y'
        then: review-then-dispose
      - when: otherwise
        then: retain
notifications:
  - id: NOT-001
    trigger: required document missing or rejected (EX-002/EX-103)
    channel: email
    recipient: ACT-001
    template: document-reminder-v1
    locale-support: true
    retry-policy: 3 attempts, exponential backoff, DLQ after 1h
  - id: NOT-002
    trigger: discretionary task blocked or hire marked not ready
    channel: in-app
    recipient: ACT-002
    template: case-attention-v1
    locale-support: true
    retry-policy: 3 attempts, exponential backoff
  - id: NOT-003
    trigger: provisioning failure or unresolved role template
    channel: email
    recipient: ACT-002
    template: provisioning-alert-v1
    locale-support: true
    retry-policy: 3 attempts, exponential backoff, DLQ after 1h
  - id: NOT-004
    trigger: mandatory training incomplete after 30-day deadline
    channel: email
    recipient: ACT-003
    template: training-overdue-v1
    locale-support: true
    retry-policy: 3 attempts, exponential backoff
  - id: NOT-005
    trigger: document could not be classified (EX-102)
    channel: in-app
    recipient: ACT-002
    template: records-review-v1
    locale-support: true
    retry-policy: 1 attempt, best effort
monitoring:
  metrics:
    - name: onboarding_cases_open
      type: gauge
      purpose: live count of open onboarding cases
      labels:
        - state
    - name: onboarding_time_to_ready_days
      type: histogram
      purpose: distribution of case-open to day-one-ready
      labels:
        - role-template
    - name: onboarding_documents_total
      type: counter
      purpose: documents by verification outcome
      labels:
        - kind
        - outcome
    - name: onboarding_discretionary_activations_total
      type: counter
      purpose: how often each optional task is activated
      labels:
        - task-kind
    - name: onboarding_provisioning_duration_seconds
      type: histogram
      purpose: day-one provisioning latency
      labels:
        - outcome
  alerts:
    - name: ALT-001
      condition: median time-to-day-one-ready exceeds SLO over 7d
      severity: warning
      channel: people-ops-chat
      runbook: RB-001
    - name: ALT-002
      condition: day-one provisioning failures > 1 in any 24h window
      severity: critical
      channel: it-oncall-pager
      runbook: RB-002
    - name: ALT-003
      condition: disposition/retention service unreachable > 15m
      severity: warning
      channel: records-chat
      runbook: RB-004
  slos:
    - name: day-one-ready-on-time
      target: 100% of hires ready by start date
      window: 30d
      error-budget: 0 late starts/month
    - name: document-verify-latency
      target: < 1 business day p95
      window: 30d
      error-budget: 5% of documents
  dashboards:
    - onboarding-overview
    - case-aging
    - provisioning-health
logging:
  categories:
    - name: application
      level: info
      sink: stdout -> log pipeline
      retention: 30d
      pii-policy: employee names masked; national_id never logged
    - name: security
      level: info
      sink: SIEM stream
      retention: 365d
      pii-policy: actor + target ids retained; IP retained (legitimate interest)
    - name: access
      level: info
      sink: gateway access logs
      retention: 90d
      pii-policy: IP truncated to /24 after 7 days
    - name: performance
      level: warn
      sink: APM
      retention: 14d
      pii-policy: no employee identifiers
  correlation: W3C traceparent propagated from the case UI through case-service to
    provisioning, e-signature, and records integrations; case-id echoed in error
    responses
  structured: true
audit:
  events:
    - id: AUD-001
      event: case.opened
      trigger: onboarding case created
      captured-fields:
        - case-id
        - actor-id
        - role-template
        - ats-hire-ref
        - timestamp
      actor-recorded: true
    - id: AUD-002
      event: access.provisioned
      trigger: day-one accounts activated
      captured-fields:
        - case-id
        - employee-id
        - role-template
        - permission-set-hash
        - timestamp
      actor-recorded: true
    - id: AUD-003
      event: document.verified
      trigger: verifier accepts or rejects a document
      captured-fields:
        - case-id
        - document-id
        - verdict
        - verifier-id
        - timestamp
      actor-recorded: true
    - id: AUD-004
      event: document.signed
      trigger: e-signature evidence package produced
      captured-fields:
        - case-id
        - document-id
        - signer-id
        - method
        - content-hash
        - timestamp
      actor-recorded: true
    - id: AUD-005
      event: retention.hold-blocked
      trigger: deletion blocked by legal hold
      captured-fields:
        - document-id
        - disposition-date
        - hold-ref
        - actor-id
        - timestamp
      actor-recorded: true
    - id: AUD-006
      event: readiness.decided
      trigger: hiring manager records readiness verdict
      captured-fields:
        - case-id
        - verdict
        - manager-id
        - timestamp
      actor-recorded: true
    - id: AUD-007
      event: case.closed
      trigger: case closed at 100% checklist
      captured-fields:
        - case-id
        - checklist-hash
        - actor-id
        - timestamp
      actor-recorded: true
  retention: 7 years (SOC2 + HR statutory limitation periods)
  immutability: append-only table with hash chaining; no UPDATE/DELETE grants;
    WORM export monthly
  access:
    - ROLE-HOLD-ADMIN
forms:
  - id: FRM-001
    name: Open Onboarding Case Form
    used-in:
      - WF-001
      - PG-001
    fields:
      - name: employeeName
        label: Employee full name
        type: text
        required: true
        validation: 1-200 chars, letters/spaces/hyphens
        error-message: Enter the employee's full legal name.
        accessibility: autocomplete=name; described-by inline error
      - name: nationalId
        label: National ID / SSN
        type: text
        required: true
        validation: format per jurisdiction; stored encrypted
        error-message: Enter a valid national identifier for the hire's jurisdiction.
        accessibility: input masked; described-by privacy note
      - name: startDate
        label: Confirmed start date
        type: date
        required: true
        validation: a future date, within 12 months
        error-message: Start date must be in the future and within the next 12 months.
        accessibility: date picker with keyboard entry
      - name: roleTemplate
        label: Role / access template
        type: select
        required: true
        validation: one of master-data:role-template
        error-message: Select the role template that defines the hire's access.
        accessibility: listbox announced via aria-activedescendant
    submit-behavior: POST API-001; disable submit while pending; show the created
      case with its task plan on success
    security:
      - csrf-token
      - rate-limited
      - rbac-case-worker-only
  - id: FRM-002
    name: Document Upload Form
    used-in:
      - WF-002
      - PG-002
    fields:
      - name: kind
        label: Document type
        type: select
        required: true
        validation: one of master-data:document-kind
        error-message: Choose which document you are uploading.
        accessibility: listbox with descriptive options
      - name: file
        label: Document file
        type: file
        required: true
        validation: PDF/JPG/PNG, max 20 MB, malware-scanned
        error-message: Upload a PDF or image under 20 MB.
        accessibility: drag-drop with keyboard fallback; upload progress via aria-live
    submit-behavior: POST API-002 multipart; show per-document verification status after upload
    security:
      - csrf-token
      - rate-limited
      - malware-scan
  - id: FRM-003
    name: Readiness Review Form
    used-in:
      - WF-001
      - PG-003
    fields:
      - name: verdict
        label: Readiness decision
        type: select
        required: true
        validation: one of [READY, NOT_READY]
        error-message: Select whether the hire is ready for day one.
        accessibility: radio-group semantics via aria-checked
      - name: note
        label: Reviewer note
        type: text
        required: false
        validation: 0-500 chars; required when verdict is NOT_READY
        error-message: Add a note explaining why the hire is not ready.
        accessibility: described-by character counter
    submit-behavior: records the readiness verdict (AUD-006); NOT_READY re-opens the
      blocking task and returns the case to ACTIVE
    security:
      - csrf-token
      - rbac-hiring-manager-only
pages:
  - id: PG-001
    name: Open Case
    route: /cases/new
    access:
      - ROLE-CASE-WORKER
    states:
      - default
      - submitting
      - created
      - error
    components:
      - FRM-001
      - role-template-help
    navigation:
      entry-points:
        - case-list
      exit-points:
        - /cases/:id
  - id: PG-002
    name: Case Documents
    route: /cases/:id/documents
    access:
      - ROLE-NEW-HIRE
      - ROLE-CASE-WORKER
    states:
      - empty
      - uploading
      - pending-verification
      - verified
      - rejected
    components:
      - FRM-002
      - document-checklist
    navigation:
      entry-points:
        - /cases/:id
        - email-link
      exit-points:
        - /cases/:id
  - id: PG-003
    name: Case Board
    route: /cases/:id
    access:
      - ROLE-CASE-WORKER
      - ROLE-HIRING-MANAGER
    states:
      - open
      - active
      - awaiting-review
      - closed
    components:
      - task-plan
      - discretionary-task-activators
      - milestone-tracker
      - FRM-003
    navigation:
      entry-points:
        - case-list
      exit-points:
        - /cases
  - id: PG-004
    name: New Hire Portal
    route: /onboarding
    access:
      - ROLE-NEW-HIRE
    states:
      - tasks-pending
      - signing
      - training
      - complete
    components:
      - my-tasks
      - e-sign-launcher
      - training-links
    navigation:
      entry-points:
        - welcome-email
      exit-points:
        - /onboarding/done
testing:
  strategy: "Test pyramid: unit (retention-class assignment, checklist gate,
    disposition decision) > integration (API + datastore + e-signature stub +
    provisioning stub) > e2e (case board flows). Security and RBAC tests run in
    CI on every PR; a case-aging load test runs before each release."
  coverage-targets:
    unit: 90% on case-service core (gate + retention + milestone logic)
    integration: all 5 API endpoints x all documented responses
    e2e: WF-001 case happy path + discretionary activation + WF-002/WF-003 failure
      paths
  golden-scenarios:
    - id: GS-001
      name: Case happy path to close
      given: an approved hire with all required documents and day-one access
        provisioned
      when: the hiring manager approves readiness and closure is confirmed
      then: the onboarding-complete milestone is marked and the case is CLOSED
      requirement: REQ-017
    - id: GS-002
      name: Discretionary task activation
      given: an open case for an on-site role
      when: the case worker activates the discretionary equipment and badge tasks
      then: both move to ACTIVE and are tracked, while a remote hire's case closes
        without them
      requirement: REQ-002
    - id: GS-003
      name: Legal hold blocks deletion
      given: a collected document under an active legal hold past its disposition date
      when: the daily disposition job runs
      then: deletion is blocked and AUD-005 is recorded
      requirement: REQ-012
    - id: GS-004
      name: Consent gates signing
      given: a new hire who has not consented to transact electronically
      when: they attempt to e-sign the offer letter
      then: signing is blocked until consent is recorded with a timestamp
      requirement: REQ-010
    - id: GS-005
      name: Early access refused
      given: an open case whose confirmed start date has not arrived
      when: provisioning runs
      then: accounts are created disabled and activation is refused until the start
        date
      requirement: REQ-013
    - id: GS-006
      name: Checklist gate blocks close
      given: a case with a required document still unverified
      when: the case worker attempts closure
      then: closure is blocked and the incomplete items are listed
      requirement: REQ-017
  security-tests:
    - rbac-discretionary-activation-by-non-worker
    - hold-release-by-non-admin
    - sql-injection-on-document-metadata
    - path-traversal-on-file-upload
    - signature-tamper-detection
    - early-activation-attempt
    - segregation-of-duties-hold-vs-case-worker
  performance-tests:
    - 50-concurrent-open-cases
    - document-upload-burst-20-per-min
    - provisioning-storm-on-monday-start-dates
deployment:
  environments:
    - dev
    - staging
    - production
  pipeline:
    - lint
    - unit-tests
    - integration-tests
    - security-scan
    - build
    - deploy-staging
    - e2e-on-staging
    - manual-gate
    - deploy-production
  rollout: canary
  rollback: automatic on ALT-002 firing during canary; otherwise one-click revert
    to previous image; DB migrations are expand-contract (never breaking)
  feature-flags:
    - discretionary-badge-enabled
    - auto-disposition-enabled
    - advanced-esign-required
  configuration:
    - DATABASE_URL
    - OBJECT_STORE_URL
    - KMS_KEY_ID
    - ESIGN_API_KEY
    - PROVISIONING_CLIENT_SECRET
    - RETENTION_ENGINE_URL
operations:
  runbooks:
    - id: RB-001
      scenario: Cases trending late to day-one-ready (ALT-001)
      steps:
        - open onboarding-overview and case-aging dashboards
        - identify the blocking task class (documents vs provisioning)
        - escalate stuck documents to hiring managers
        - "if provisioning: check INT-002 provisioning health"
        - "note the trend in #people-ops-ops"
      owner: people-ops-lead
    - id: RB-002
      scenario: Day-one provisioning failure (ALT-002)
      steps:
        - confirm accounts are disabled, not partially enabled
        - check INT-002 IdP/MDM status
        - resolve the role template or KMS access issue
        - re-run provisioning; verify accounts activate on the start date
        - record the incident against the case
      owner: it-provisioning-lead
    - id: RB-003
      scenario: Mandatory training overdue (RSK-003)
      steps:
        - pull the non-compliant case list
        - confirm NOT-004 was delivered
        - escalate to the hiring manager
        - if repeated, raise to security-officer for compliance tracking
      owner: security-officer
    - id: RB-004
      scenario: Retention/disposition service down (ALT-003) or GDPR erasure request
      steps:
        - verify no documents were auto-purged while INT-003 was unavailable
        - "for erasure: confirm no overriding legal basis or active hold"
        - execute defensible deletion across primary store, indexes, and backups
        - record the outcome (erased vs retained-with-reason) in the audit trail
      owner: data-protection-officer
  capacity:
    expected-load: 10 open cases steady, 5 document uploads/min
    peak-load: 50 concurrent open cases (seasonal hiring waves)
    scaling-strategy: horizontal auto-scale on CPU + queue depth; object store sized
      for 10x steady document volume
  maintenance:
    - weekly-dependency-patching
    - monthly-secret-rotation-check
    - quarterly-role-template-and-retention-class-review
  on-call: platform on-call rota; provisioning failures page
    it-provisioning-oncall with security-officer escalation for access anomalies
support:
  tiers:
    - self-service-help-center
    - tier-1-people-ops
    - tier-2-it-provisioning
    - security-escalation
  escalation: tier-1 -> tier-2 within 4 business hours; suspected access anomaly
    -> security-officer immediately
  common-issues:
    - issue: New hire cannot upload a document
      resolution: check file type/size and malware-scan result; tier-1 can re-issue
        the upload link
      kb-ref: KB-ONB-001
    - issue: Discretionary task not visible on the case
      resolution: confirm the task is discretionary and AVAILABLE; only a case worker
        can activate it
      kb-ref: KB-ONB-002
    - issue: Accounts not active on the start date
      resolution: verify the start date is correct and provisioning succeeded;
        escalate to tier-2 if accounts remain disabled
      kb-ref: KB-ONB-003
  user-impact-comms: in-app banner on the case board for provisioning incidents >
    30 min; templated comms owned by people-ops-lead
documentation:
  - type: user-guide
    audience: new hires
    owner: people-ops-lead
    location: help-center/onboarding/
    update-trigger: any change to the new-hire portal or required documents
  - type: admin-guide
    audience: case workers
    owner: people-ops-lead
    location: docs/onboarding/case-worker.md
    update-trigger: any change to the task plan or discretionary tasks
  - type: api-reference
    audience: client developers
    owner: case-service-team
    location: docs/api/onboarding.md
    update-trigger: any API contract change (CI-enforced)
  - type: runbook
    audience: on-call engineers
    owner: it-provisioning-lead
    location: operations.runbooks
    update-trigger: every incident post-mortem
  - type: architecture
    audience: engineers
    owner: architect
    location: docs/architecture/onboarding.md
    update-trigger: any ADR affecting the case model or root-model type
governance:
  approvals:
    - gate: G1-requirements
      approver-role: people-ops-lead
      status: pending
    - gate: G2-architecture
      approver-role: architect
      status: pending
    - gate: G3-data-model
      approver-role: architect
      status: pending
    - gate: G4-security
      approver-role: security-officer
      status: pending
  lifecycle: draft
  version: 1.0.0
  change-policy: changes to must-priority requirements, the security section, or
    retention classes reopen the affected gate; all changes via PR with trace
    update
  traceability: every hidden requirement and cross-cutting domain cites
    discovery/<domain>/<rule-id>; explicit items cite the verbatim story; the
    root case and sub-workflows reference requirement ids;
    audit/notification/runbook ids cross-link
compliance:
  regulations:
    - name: SOC2
      applicable: true
      rationale: logical-access provisioning and audit evidence are in scope for
        customer SOC2 Type II reports
      obligations:
        - logical-access-controls-CC6
        - least-privilege-provisioning
        - audit-trail-retention
        - change-management-evidence
    - name: GDPR
      applicable: true
      rationale: EU-based hires assumed in scope (ASM-002); PII processed (name,
        national ID, address, IP)
      obligations:
        - lawful-basis-and-consent-capture
        - retention-class-per-record
        - 30-day-erasure-including-backups
        - data-subject-rights-support
    - name: eIDAS
      applicable: true
      rationale: electronic signatures on offer letter and policy acknowledgement
      obligations:
        - signer-consent-capture
        - tamper-evident-evidence-package
        - trusted-timestamp-RFC3161
        - assurance-level-per-document
    - name: HIPAA
      applicable: false
      rationale: no health data processed by this onboarding case
    - name: PCI-DSS
      applicable: false
      rationale: no cardholder data; payroll banking handled downstream
  privacy:
    pii-inventory:
      - ENT-OnboardingCase.employee_name
      - ENT-OnboardingCase.national_id
      - ENT-SignatureEvidence.signer_ip
    consent: explicit consent to transact electronically captured before signing
      (ESIGN/UETA); privacy-notice consent captured at case open with version +
      timestamp
    data-subject-rights:
      - access
      - rectification
      - erasure
      - portability
  backup:
    strategy: automated daily snapshots + continuous WAL archiving; encrypted at
      rest; cross-region copy; object store versioned
    rpo: 15 minutes
    rto: 2 hours
  disaster-recovery:
    plan: warm standby in a secondary region; DNS failover; case state and documents
      restored from durable storage; in-flight signatures resume from the
      e-signature provider
    test-frequency: twice yearly game-day, including restore-from-backup drill
_meta:
  aggregated_from:
    - 01-initialized.yaml
    - 02-in-progress.yaml
    - 03-generating-app.yaml
    - 04-root-models.yaml
    - 05-dependent-models.yaml
    - 06-forms.yaml
  produced_by: awp build --aggregate
