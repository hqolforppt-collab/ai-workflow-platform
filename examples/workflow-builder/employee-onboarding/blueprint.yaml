project:
  name: Employee Onboarding Case
  id: BLU-EMPLOYEE-ONBOARDING
  blueprint-schema-version: 2.0.0
  maturity-level: L6
  story: Employee onboarding case with document collection, equipment
    provisioning, and training
  summary: >
    A case-managed employee onboarding workflow (CMMN-shaped, not a rigid
    process): an onboarding case is opened per new hire, carrying required tasks
    (document collection, policy e-signature, day-one access provisioning) and
    discretionary tasks a case worker activates on judgement (equipment
    provisioning, badge issuance, training enrollment). Discovery expanded the
    three named concerns (documents, equipment, training) into 27 domains
    covering identity and access, e-signature non-repudiation, records retention
    and legal hold, security hardening, observability, resilience, and
    compliance obligations (SOC2, GDPR, eIDAS/ESIGN). The case reaches
    milestones (record-opened, documents-complete, day-one-ready,
    onboarding-complete) rather than running a single fixed path.
  scope:
    in-scope:
      - Case creation per approved new hire with a required-vs-discretionary
        task plan
      - Document collection with per-record retention classes and legal-hold
        support
      - Policy acknowledgement and offer-letter e-signature with tamper-evident
        evidence
      - Role-template access provisioning activated on the confirmed start date
      - Discretionary tasks (equipment provisioning, badge issuance, training
        enrollment) a case worker may activate
      - Milestones, human decision points, and a 100%-checklist completion gate
      - Audit trail, structured logging, metrics, alerts, and SLOs for every
        case event
    out-of-scope:
      - Payroll calculation and tax filing (handoff to payroll system; see
        ASM-003)
      - Offboarding / deprovisioning (separate case type; see ASM-004)
      - Recruiting and applicant tracking upstream of the approved-hire trigger
      - Physical facilities provisioning beyond badge issuance (desk, parking)
  stakeholders:
    - people-ops-lead
    - hiring-manager
    - it-provisioning-lead
    - security-officer
    - data-protection-officer
  created: 2026-07-05
