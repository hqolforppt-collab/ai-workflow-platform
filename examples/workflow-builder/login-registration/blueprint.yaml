# --------------------------------------------------------------- 1. PROJECT
project:
  name: Login and Registration Feature
  id: BLU-LOGIN-REG-001
  blueprint-schema-version: 2.0.0
  maturity-level: L6
  story: "Create Login and Registration Feature"
  summary: >
    Self-service account registration with email verification and credential-based
    login. Discovery expanded the one-line story into 27 domains: the user asked
    for 2 (authentication, identity-management); 25 hidden domains were added
    covering security hardening (password policy, lockout, rate limiting, fraud
    detection), observability (audit, logging, monitoring, analytics), resilience
    (backup, disaster recovery), and obligations (GDPR privacy, SOC2 compliance,
    documentation, operations).
  scope:
    in-scope:
      - Email + password registration with mandatory email verification
      - Credential login with session issuance (JWT access + rotating refresh cookie)
      - Password reset via time-boxed email link
      - Account lockout, rate limiting, and login-anomaly detection
      - Audit trail, structured logging, metrics, alerts, and SLOs for all auth events
    out-of-scope:
      - Social login / OAuth federation (not requested; see ASM-003)
      - Multi-factor authentication enrollment UI (policy defined, UI deferred; see ASM-004)
      - Account deletion self-service flow (GDPR erasure handled via support runbook RB-003)
      - Single sign-on (SSO/SAML) for enterprise tenants
  stakeholders: [product-owner, security-officer, data-protection-officer, sre-lead, support-lead]
  created: 2026-06-12

# --------------------------------------------------------------- 2. DOMAINS
domains:
  functional:
    - { id: authentication,      name: Authentication,       source: user }
    - { id: identity-management, name: Identity Management,  source: user }
    - { id: session-management,  name: Session Management,   source: discovery, rationale: "implication-map: authentication -> session-management" }
    - { id: user-management,     name: User Management,      source: discovery, rationale: "implication-map: identity-management -> user-management" }
    - { id: email,               name: Email Delivery,       source: discovery, rationale: "implication-map: identity-management -> email (verification, reset)" }
    - { id: authorization,       name: Authorization,        source: discovery, rationale: "implication-map: user-management -> authorization" }
  cross-cutting:   # 21 entries — VAL-010 requires >= 12; VAL-013 list fully covered
    - { id: security,           name: Security,                 source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-01, criticality: mandatory }
    - { id: password-policy,    name: Password Policy,          source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-02, criticality: mandatory }
    - { id: account-lockout,    name: Account Lockout,          source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-03, criticality: mandatory }
    - { id: rate-limiting,      name: Rate Limiting,            source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-04, criticality: mandatory }
    - { id: fraud-detection,    name: Fraud Detection,          source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-05, criticality: mandatory }
    - { id: audit,              name: Audit Trail,              source: discovery, discovery-rule: discovery/authentication/AUTH-IMP-06, criticality: mandatory }
    - { id: email-verification, name: Email Verification,       source: discovery, discovery-rule: discovery/identity-management/IDM-IMP-01, criticality: mandatory }
    - { id: privacy,            name: Privacy (GDPR),           source: discovery, discovery-rule: discovery/identity-management/IDM-IMP-02, criticality: mandatory }
    - { id: compliance,         name: Compliance (SOC2),        source: discovery, discovery-rule: discovery/privacy/PRV-IMP-01, criticality: mandatory }
    - { id: logging,            name: Logging,                  source: discovery, discovery-rule: discovery/baseline/ANY-UF-01, criticality: mandatory }
    - { id: monitoring,         name: Monitoring,               source: discovery, discovery-rule: discovery/baseline/ANY-UF-02, criticality: mandatory }
    - { id: notification,       name: Notifications,            source: discovery, discovery-rule: discovery/email/EML-IMP-01, criticality: mandatory }
    - { id: error-management,   name: Error Management,         source: discovery, discovery-rule: discovery/baseline/ANY-UF-03, criticality: mandatory }
    - { id: observability,      name: Observability,            source: discovery, discovery-rule: discovery/baseline/ANY-UF-04, criticality: mandatory }
    - { id: analytics,          name: Analytics,                source: discovery, discovery-rule: discovery/baseline/ANY-UF-05, criticality: recommended }
    - { id: documentation,      name: Documentation,            source: discovery, discovery-rule: discovery/baseline/ANY-UF-06, criticality: mandatory }
    - { id: testing,            name: Testing,                  source: discovery, discovery-rule: discovery/baseline/ANY-UF-07, criticality: mandatory }
    - { id: deployment,         name: Deployment,               source: discovery, discovery-rule: discovery/baseline/ANY-UF-08, criticality: mandatory }
    - { id: operations,         name: Operations,               source: discovery, discovery-rule: discovery/baseline/ANY-UF-09, criticality: mandatory }
    - { id: backup,             name: Backup,                   source: discovery, discovery-rule: discovery/baseline/ANY-UF-10, criticality: mandatory }
    - { id: disaster-recovery,  name: Disaster Recovery,        source: discovery, discovery-rule: discovery/baseline/ANY-UF-11, criticality: mandatory }

# ----------------------------------------------------------- 3. REQUIREMENTS
requirements:
  explicit:
    - id: REQ-001
      title: User registration with email and password
      description: A visitor can create an account by providing email and password; the account is unusable until the email is verified.
      domain: identity-management
      source: user
      priority: must
      acceptance-criteria:
        - "Given a visitor on the registration page, When they submit a unique email and a policy-compliant password, Then an account is created in state PENDING_VERIFICATION and a verification email is sent within 60 seconds."
        - "Given a visitor submits an email that already exists, When the form is processed, Then the response is identical to the success response (no account-enumeration) and the existing owner receives a 'was this you?' notice."
      depends-on: []
      risks: [RSK-002]
    - id: REQ-002
      title: User login with credentials
      description: A registered, verified user can log in with email and password and receive an authenticated session.
      domain: authentication
      source: user
      priority: must
      acceptance-criteria:
        - "Given a verified user, When they submit correct credentials, Then a session is issued (access JWT 15 min, refresh cookie 30 days) and the user lands on /dashboard within 2 seconds (p95)."
        - "Given any user, When they submit wrong credentials, Then the response is a generic 401 'invalid email or password' with no field-level hint, in constant time (±50ms)."
      depends-on: [REQ-001]
      risks: [RSK-001]
  hidden:
    - id: REQ-010
      title: Password policy enforcement
      description: Passwords must meet minimum strength and must be rejected if found in known-breach corpora.
      domain: password-policy
      source: discovery/password-policy
      priority: must
      acceptance-criteria:
        - "Given a password shorter than 12 characters or present in the breached-password list, When submitted on registration or reset, Then it is rejected with a specific, actionable error and the attempt is logged at level info."
      risks: [RSK-001]
    - id: REQ-011
      title: Account lockout on repeated failures
      description: Throttle credential-stuffing by locking accounts after repeated failed logins.
      domain: account-lockout
      source: discovery/account-lockout
      priority: must
      acceptance-criteria:
        - "Given 5 failed login attempts for one account within 15 minutes, When the 6th attempt arrives, Then the account locks for 30 minutes, the owner is emailed (NOT-003), and audit event AUD-004 is recorded."
      risks: [RSK-001]
    - id: REQ-012
      title: Rate limiting on auth endpoints
      description: All authentication endpoints are rate limited per IP and per account.
      domain: rate-limiting
      source: discovery/rate-limiting
      priority: must
      acceptance-criteria:
        - "Given more than 10 requests/minute per IP to any /auth/* endpoint, When the limit is exceeded, Then the API returns 429 with Retry-After and the event increments metric auth_rate_limited_total."
      risks: [RSK-001]
    - id: REQ-013
      title: Email verification before first login
      description: Accounts must verify ownership of their email before the first successful login.
      domain: email-verification
      source: discovery/email-verification
      priority: must
      acceptance-criteria:
        - "Given a PENDING_VERIFICATION account, When the user clicks the emailed link within 24 hours, Then the account transitions to ACTIVE; expired links offer a one-click resend."
      risks: [RSK-002]
    - id: REQ-014
      title: Complete audit trail for auth events
      description: Every security-relevant event is captured immutably with actor, timestamp, IP, and outcome.
      domain: audit
      source: discovery/audit
      priority: must
      acceptance-criteria:
        - "Given any event in the audit.events catalog, When it occurs, Then an append-only audit record exists within 5 seconds containing every captured-field defined for that event."
      risks: [RSK-003]
    - id: REQ-015
      title: Login anomaly detection
      description: Detect and react to suspicious logins (new device, impossible travel, TOR exit nodes).
      domain: fraud-detection
      source: discovery/fraud-detection
      priority: should
      acceptance-criteria:
        - "Given a successful login from a device or geo never seen for that account, When the session is issued, Then the user receives a security notification (NOT-004) and the login is flagged for the risk dashboard."
      risks: [RSK-001]
    - id: REQ-016
      title: GDPR-compliant handling of personal data
      description: Email, name, and IP addresses are inventoried as PII with consent capture and data-subject rights support.
      domain: privacy
      source: discovery/privacy
      priority: must
      acceptance-criteria:
        - "Given a registration, When the account is created, Then consent (version + timestamp) is stored, and a verified erasure request purges PII from primary store and backups within 30 days."
      risks: [RSK-004]
    - id: REQ-017
      title: Auth observability — metrics, alerts, SLOs
      description: Login/registration health is measurable and alertable before users complain.
      domain: monitoring
      source: discovery/monitoring
      priority: must
      acceptance-criteria:
        - "Given the production environment, When login success-rate (5-min window) drops below 95%, Then alert ALT-001 fires to the on-call channel with runbook RB-001 linked."
      risks: [RSK-003]
    - id: REQ-018
      title: Secure session lifecycle
      description: Sessions are revocable, idle-expire, and refresh tokens rotate on every use.
      domain: session-management
      source: discovery/session-management
      priority: must
      acceptance-criteria:
        - "Given an issued refresh token, When it is used twice (replay), Then the entire session family is revoked, the user is logged out everywhere, and audit event AUD-006 is recorded."
      risks: [RSK-001]
    - id: REQ-019
      title: Password reset flow
      description: Users can recover access via a time-boxed, single-use emailed reset link.
      domain: authentication
      source: discovery/authentication
      priority: must
      acceptance-criteria:
        - "Given a reset request, When the user opens the link within 30 minutes, Then they may set a new policy-compliant password; all existing sessions are revoked on success."
      risks: [RSK-002]

# --------------------------------------------------------------- 4. ACTORS
actors:
  - id: ACT-001
    name: Visitor
    type: human
    description: Unauthenticated person registering or attempting to log in.
    goals: [create an account, regain access via password reset]
    interactions: [WF-001, WF-002, WF-003]
  - id: ACT-002
    name: Registered User
    type: human
    description: Verified account holder logging in and managing their session.
    goals: [log in securely, stay logged in across visits, be alerted to suspicious activity]
    interactions: [WF-002, WF-003]
  - id: ACT-003
    name: Auth Service
    type: service
    description: Backend service owning credentials, sessions, tokens, and lockout state.
    goals: [issue and revoke sessions, enforce all security policies]
    interactions: [WF-001, WF-002, WF-003]
  - id: ACT-004
    name: Email Provider
    type: system
    description: External transactional email system (verification, reset, security notices).
    goals: [deliver templated email within 60 seconds]
    interactions: [WF-001, WF-003]
  - id: ACT-005
    name: Token Janitor
    type: scheduler
    description: Scheduled job purging expired verification/reset tokens and stale sessions.
    goals: [keep token tables bounded, enforce retention]
    interactions: [WF-002]

# ----------------------------------------------------------------- 5. ROLES
roles:
  - id: ROLE-ANONYMOUS
    name: Anonymous
    permissions: ["auth:register", "auth:login", "auth:request-reset"]
    assigned-actors: [ACT-001]
  - id: ROLE-USER
    name: Authenticated User
    inherits: ROLE-ANONYMOUS
    permissions: ["session:refresh", "session:revoke-own", "profile:read-own"]
    assigned-actors: [ACT-002]
  - id: ROLE-AUTH-ADMIN
    name: Auth Administrator
    permissions: ["account:unlock", "account:suspend", "audit:read"]
    assigned-actors: []
    separation-of-duties: [ROLE-USER]   # an admin account may not be used as a daily-driver user account

# -------------------------------------------------------------- 6. SECURITY
security:
  authentication:
    methods: [email-password]
    password-policy:
      min-length: 12
      complexity: "zxcvbn score >= 3; no character-class composition rules (NIST 800-63B)"
      history: 5
      max-age-days: 0   # no forced rotation (NIST 800-63B); rotation only on compromise
    mfa:
      required: false
      methods: [totp]
      enrollment: "optional self-service post-launch; policy ready, UI deferred (ASM-004)"
    session:
      storage: "access JWT (memory) + refresh token in HttpOnly Secure SameSite=Lax cookie"
      ttl-minutes: 15
      idle-timeout-minutes: 43200   # refresh cookie 30 days
      refresh-strategy: "rotate-on-use; replay detection revokes session family"
      revocation: "server-side session-family table; logout-all supported"
    account-lockout:
      threshold: 5
      window-minutes: 15
      lockout-minutes: 30
      notification: NOT-003
    rate-limiting:
      scope: "per-IP and per-account on all /auth/* endpoints"
      limit: 10
      window: 1m
      response: "429 + Retry-After header"
  authorization:
    model: rbac
    enforcement-points: [api-gateway, auth-service-middleware]
  data-protection:
    encryption-at-rest: "AES-256 (managed Postgres); password hashes argon2id (m=64MiB, t=3, p=4)"
    encryption-in-transit: "TLS 1.3 only; HSTS max-age=63072000"
    secrets-management: "platform secret store; no secrets in env files or code; 90-day rotation"
  threat-controls:
    - { threat: "Credential stuffing",  mitigation: "lockout + per-IP rate limit + breached-password rejection (REQ-010..012)", owner: security-officer }
    - { threat: "Account enumeration",  mitigation: "uniform responses and constant-time compare on register/login/reset", owner: dev-lead }
    - { threat: "Session hijacking",    mitigation: "HttpOnly Secure cookies, rotation-on-use, replay-triggered family revocation", owner: dev-lead }
    - { threat: "Token leakage via logs", mitigation: "log redaction policy: tokens, passwords, and secrets never logged (logging.pii-policy)", owner: sre-lead }

# ------------------------------------------------------------------ 7. AUDIT
audit:
  events:
    - { id: AUD-001, event: user.registered,          trigger: "successful registration submit",   captured-fields: [user-id, email-hash, ip, user-agent, consent-version, timestamp], actor-recorded: true }
    - { id: AUD-002, event: user.email-verified,      trigger: "verification link consumed",       captured-fields: [user-id, token-id, ip, timestamp], actor-recorded: true }
    - { id: AUD-003, event: user.login-succeeded,     trigger: "credentials accepted",              captured-fields: [user-id, ip, user-agent, device-fingerprint, geo, timestamp], actor-recorded: true }
    - { id: AUD-004, event: user.login-failed,        trigger: "credentials rejected or locked",    captured-fields: [email-hash, failure-reason, attempt-count, ip, timestamp], actor-recorded: false }
    - { id: AUD-005, event: user.password-reset,      trigger: "password changed via reset flow",   captured-fields: [user-id, token-id, ip, sessions-revoked-count, timestamp], actor-recorded: true }
    - { id: AUD-006, event: session.replay-detected,  trigger: "refresh token reuse",               captured-fields: [user-id, session-family-id, ip, timestamp], actor-recorded: true }
    - { id: AUD-007, event: account.locked,           trigger: "lockout threshold reached",         captured-fields: [user-id, window-attempts, lock-duration, timestamp], actor-recorded: false }
  retention: "7 years (SOC2 + statutory limitation periods)"
  immutability: "append-only table with hash chaining; no UPDATE/DELETE grants; WORM export monthly"
  access: [ROLE-AUTH-ADMIN]

# ---------------------------------------------------------------- 8. LOGGING
logging:
  categories:
    - { name: application, level: info,  sink: "stdout -> log pipeline", retention: 30d,  pii-policy: "emails masked to f***@domain; no tokens/passwords ever" }
    - { name: security,    level: info,  sink: "SIEM stream",            retention: 365d, pii-policy: "IP retained (legitimate interest, privacy notice §4); emails hashed" }
    - { name: access,      level: info,  sink: "gateway access logs",    retention: 90d,  pii-policy: "IP truncated to /24 after 7 days" }
    - { name: performance, level: warn,  sink: "APM",                    retention: 14d,  pii-policy: "no user identifiers" }
  correlation: "W3C traceparent propagated from edge through auth-service to email provider; request-id echoed in error responses"
  structured: true

# ------------------------------------------------------------- 9. MONITORING
monitoring:
  metrics:
    - { name: auth_login_attempts_total,   type: counter,   purpose: "login volume by outcome",            labels: [outcome, method] }
    - { name: auth_registrations_total,    type: counter,   purpose: "funnel top — registrations by state", labels: [state] }
    - { name: auth_rate_limited_total,     type: counter,   purpose: "abuse pressure on auth endpoints",    labels: [endpoint] }
    - { name: auth_login_duration_seconds, type: histogram, purpose: "login latency distribution",          labels: [outcome] }
    - { name: auth_active_sessions,        type: gauge,     purpose: "live session count",                  labels: [] }
  alerts:
    - { name: ALT-001, condition: "login success-rate < 95% over 5m", severity: critical, channel: oncall-pager, runbook: RB-001 }
    - { name: ALT-002, condition: "email verification deliveries failing > 5% over 15m", severity: warning, channel: team-chat, runbook: RB-002 }
    - { name: ALT-003, condition: "auth_rate_limited_total spike > 10x baseline over 10m", severity: warning, channel: security-chat, runbook: RB-001 }
  slos:
    - { name: login-availability, target: "99.9%", window: 30d, error-budget: "43m/month" }
    - { name: login-latency-p95,  target: "< 2s",  window: 30d, error-budget: "5% of requests" }
  dashboards: [auth-overview, auth-security-signals, registration-funnel]

# ---------------------------------------------------------- 10. NOTIFICATIONS
notifications:
  - { id: NOT-001, trigger: "registration created (AUD-001)",      channel: email, recipient: ACT-001, template: verify-email-v1,      locale-support: true, retry-policy: "3 attempts, exponential backoff, DLQ after 1h" }
  - { id: NOT-002, trigger: "password reset requested",            channel: email, recipient: ACT-002, template: reset-password-v1,    locale-support: true, retry-policy: "3 attempts, exponential backoff, DLQ after 1h" }
  - { id: NOT-003, trigger: "account locked (AUD-007)",            channel: email, recipient: ACT-002, template: account-locked-v1,    locale-support: true, retry-policy: "3 attempts, exponential backoff" }
  - { id: NOT-004, trigger: "anomalous login detected (REQ-015)",  channel: email, recipient: ACT-002, template: new-device-login-v1,  locale-support: true, retry-policy: "3 attempts, exponential backoff" }
  - { id: NOT-005, trigger: "registration with existing email",    channel: email, recipient: ACT-002, template: was-this-you-v1,      locale-support: true, retry-policy: "1 attempt, best effort" }

# ------------------------------------------------------------- 11. DATA-MODEL
data-model:
  entities:
    - id: ENT-User
      name: User
      description: Account holder identity and credential record.
      attributes:
        - { name: id,             type: uuid,        required: true,  pii: false, unique: true,  default: gen_random_uuid(), validation: "uuidv4" }
        - { name: email,          type: citext,      required: true,  pii: true,  unique: true,  default: null, validation: "RFC 5322; max 254 chars" }
        - { name: password_hash,  type: text,        required: true,  pii: false, unique: false, default: null, validation: "argon2id encoded string" }
        - { name: status,         type: enum,        required: true,  pii: false, unique: false, default: PENDING_VERIFICATION, validation: "one of master-data:account-status" }
        - { name: consent_version, type: text,       required: true,  pii: false, unique: false, default: null, validation: "matches published privacy-notice version" }
        - { name: created_at,     type: timestamptz, required: true,  pii: false, unique: false, default: now(), validation: "not in future" }
      relationships:
        - { target: ENT-Session, cardinality: 1-n, on-delete: cascade }
        - { target: ENT-AuthToken, cardinality: 1-n, on-delete: cascade }
      retention: "active accounts: lifetime; deleted accounts: PII purged within 30 days (REQ-016)"
      classification: confidential
    - id: ENT-Session
      name: Session
      description: Session family with rotating refresh tokens.
      attributes:
        - { name: id,             type: uuid,        required: true,  pii: false, unique: true,  default: gen_random_uuid(), validation: "uuidv4" }
        - { name: user_id,        type: uuid,        required: true,  pii: false, unique: false, default: null, validation: "fk ENT-User" }
        - { name: refresh_hash,   type: text,        required: true,  pii: false, unique: true,  default: null, validation: "sha256 of current refresh token" }
        - { name: device_label,   type: text,        required: false, pii: true,  unique: false, default: null, validation: "max 120 chars, sanitized" }
        - { name: ip,             type: inet,        required: true,  pii: true,  unique: false, default: null, validation: "valid IPv4/IPv6" }
        - { name: expires_at,     type: timestamptz, required: true,  pii: false, unique: false, default: "now() + 30d", validation: "> now()" }
        - { name: revoked_at,     type: timestamptz, required: false, pii: false, unique: false, default: null, validation: "nullable" }
      relationships: []
      retention: "90 days after expiry/revocation, then hard-deleted"
      classification: confidential
    - id: ENT-AuthToken
      name: AuthToken
      description: Single-use verification and reset tokens.
      attributes:
        - { name: id,         type: uuid,        required: true, pii: false, unique: true,  default: gen_random_uuid(), validation: "uuidv4" }
        - { name: user_id,    type: uuid,        required: true, pii: false, unique: false, default: null, validation: "fk ENT-User" }
        - { name: kind,       type: enum,        required: true, pii: false, unique: false, default: null, validation: "one of master-data:token-kind" }
        - { name: token_hash, type: text,        required: true, pii: false, unique: true,  default: null, validation: "sha256; raw token never stored" }
        - { name: expires_at, type: timestamptz, required: true, pii: false, unique: false, default: null, validation: "verify: +24h; reset: +30m" }
        - { name: used_at,    type: timestamptz, required: false, pii: false, unique: false, default: null, validation: "single use; non-null blocks reuse" }
      relationships: []
      retention: "purged 7 days after expiry by ACT-005"
      classification: restricted

# ------------------------------------------------------------ 12. MASTER-DATA
master-data:
  - { name: account-status, values: [PENDING_VERIFICATION, ACTIVE, LOCKED, SUSPENDED, DELETED], owner: auth-service-team, change-process: "ADR + migration + G3 review" }
  - { name: token-kind,     values: [EMAIL_VERIFY, PASSWORD_RESET],                              owner: auth-service-team, change-process: "ADR + migration + G3 review" }
  - { name: email-templates, values: [verify-email-v1, reset-password-v1, account-locked-v1, new-device-login-v1, was-this-you-v1], owner: product-design, change-process: "template registry PR + legal review for compliance-relevant copy" }

# -------------------------------------------------------------- 13. WORKFLOWS
workflows:
  - id: WF-001
    name: Registration with Email Verification
    trigger: "Visitor submits the registration form (FRM-001)"
    actors: [ACT-001, ACT-003, ACT-004]
    requirements: [REQ-001, REQ-010, REQ-013, REQ-016]
    steps:
      - { id: S1, name: Validate input,          type: system-action, actor: ACT-003, inputs: [email, password, consent], outputs: [validated-payload], on-success: S2, on-failure: "EX-001 (field errors returned to form)" }
      - { id: S2, name: Check password policy,   type: system-action, actor: ACT-003, inputs: [password], outputs: [policy-verdict], on-success: S3, on-failure: "EX-001 (policy violation message)" }
      - { id: S3, name: Detect duplicate email,  type: decision,      actor: ACT-003, inputs: [email], outputs: [is-duplicate], on-success: S4, on-failure: "EX-002 (uniform success + NOT-005 to owner)", audit-event: AUD-001 }
      - { id: S4, name: Create account + token,  type: system-action, actor: ACT-003, inputs: [validated-payload], outputs: [user-id, verify-token], on-success: S5, on-failure: "EX-003 (retry-safe; idempotency key on email)" }
      - { id: S5, name: Send verification email, type: notification,  actor: ACT-004, inputs: [verify-token], outputs: [delivery-receipt], on-success: S6, on-failure: "EX-004 (queued retry; user shown 'check your email' regardless)" }
      - { id: S6, name: Consume verify link,     type: user-action,   actor: ACT-001, inputs: [token], outputs: [account-ACTIVE], on-success: END, on-failure: "EX-005 (expired -> one-click resend)", audit-event: AUD-002 }
    exceptions:
      - { id: EX-001, condition: "validation or policy failure",  handling: "400 with field errors; no account created", notification: null }
      - { id: EX-002, condition: "email already registered",      handling: "uniform 'check your email' response; NOT-005 sent to existing owner", notification: NOT-005 }
      - { id: EX-003, condition: "datastore write failure",       handling: "500; safe retry via idempotency key; alert if error-rate breaches ALT-001", notification: null }
      - { id: EX-004, condition: "email provider down",           handling: "message queued with retry policy; DLQ + ALT-002 after 1h", notification: null }
      - { id: EX-005, condition: "verification token expired",    handling: "resend flow issues fresh token, old token invalidated", notification: NOT-001 }
    sla: "registration submit -> verification email sent: 60 seconds (p95)"
  - id: WF-002
    name: Login and Session Issuance
    trigger: "User submits the login form (FRM-002)"
    actors: [ACT-001, ACT-002, ACT-003, ACT-005]
    requirements: [REQ-002, REQ-011, REQ-012, REQ-015, REQ-018]
    steps:
      - { id: S1, name: Rate-limit check,        type: system-action, actor: ACT-003, inputs: [ip, email], outputs: [allowed], on-success: S2, on-failure: "EX-101 (429 Retry-After)" }
      - { id: S2, name: Lockout check,           type: decision,      actor: ACT-003, inputs: [email], outputs: [lock-state], on-success: S3, on-failure: "EX-102 (generic 401; lock not disclosed)" }
      - { id: S3, name: Verify credentials,      type: system-action, actor: ACT-003, inputs: [email, password], outputs: [user-id], on-success: S4, on-failure: "EX-103 (401 + failed-attempt counter + AUD-004)", audit-event: AUD-003 }
      - { id: S4, name: Anomaly scoring,         type: system-action, actor: ACT-003, inputs: [ip, device-fingerprint, geo], outputs: [risk-score], on-success: S5, on-failure: "S5 (scoring failure never blocks login; logged at warn)" }
      - { id: S5, name: Issue session,           type: system-action, actor: ACT-003, inputs: [user-id, risk-score], outputs: [access-jwt, refresh-cookie], on-success: S6, on-failure: "EX-104 (500; no partial session persisted)" }
      - { id: S6, name: Notify if anomalous,     type: notification,  actor: ACT-003, inputs: [risk-score], outputs: [notice-sent], on-success: END, on-failure: "END (notification failure logged, never blocks login)" }
    exceptions:
      - { id: EX-101, condition: "rate limit exceeded",     handling: "429 + Retry-After; metric auth_rate_limited_total", notification: null }
      - { id: EX-102, condition: "account locked",          handling: "generic 401; remaining lock time NOT disclosed; AUD-004", notification: null }
      - { id: EX-103, condition: "invalid credentials",     handling: "constant-time generic 401; increment lockout window counter; lock + NOT-003 at threshold (AUD-007)", notification: NOT-003 }
      - { id: EX-104, condition: "session store failure",   handling: "500 with request-id; on-call paged via ALT-001 if sustained", notification: null }
    sla: "login submit -> session issued: 2 seconds (p95)"
  - id: WF-003
    name: Password Reset
    trigger: "User requests reset from /login (forgot-password)"
    actors: [ACT-001, ACT-002, ACT-003, ACT-004]
    requirements: [REQ-019, REQ-010, REQ-018]
    steps:
      - { id: S1, name: Accept reset request,  type: system-action, actor: ACT-003, inputs: [email], outputs: [queued], on-success: S2, on-failure: "EX-201 (uniform response regardless of account existence)" }
      - { id: S2, name: Send reset email,      type: notification,  actor: ACT-004, inputs: [reset-token], outputs: [delivery-receipt], on-success: S3, on-failure: "EX-202 (retry queue; uniform UX)" }
      - { id: S3, name: Set new password,      type: user-action,   actor: ACT-001, inputs: [token, new-password], outputs: [password-updated], on-success: S4, on-failure: "EX-203 (expired/used token -> restart flow)", audit-event: AUD-005 }
      - { id: S4, name: Revoke all sessions,   type: system-action, actor: ACT-003, inputs: [user-id], outputs: [sessions-revoked], on-success: END, on-failure: "EX-204 (revocation MUST succeed; retry then page on-call)" }
    exceptions:
      - { id: EX-201, condition: "email not registered",  handling: "uniform 'check your email' response; nothing sent; attempt logged", notification: null }
      - { id: EX-202, condition: "email provider down",   handling: "queued retry per NOT-002 policy", notification: null }
      - { id: EX-203, condition: "token expired or used", handling: "400 with restart link; single-use enforced via used_at", notification: null }
      - { id: EX-204, condition: "session revocation failure", handling: "blocking retry x3 then page on-call; password change is rolled back if revocation impossible", notification: null }
    sla: "reset request -> email sent: 60 seconds (p95)"

# ------------------------------------------------------------------ 14. FORMS
forms:
  - id: FRM-001
    name: Registration Form
    used-in: [WF-001, PG-001]
    fields:
      - { name: email,    label: "Email address", type: email,    required: true, validation: "RFC 5322, max 254", error-message: "Enter a valid email address.", accessibility: "autocomplete=email; described-by inline error" }
      - { name: password, label: "Password",      type: password, required: true, validation: "min 12 chars, zxcvbn>=3, not breached", error-message: "Password must be at least 12 characters and not a commonly used password.", accessibility: "strength meter announced via aria-live=polite" }
      - { name: consent,  label: "I agree to the privacy notice", type: checkbox, required: true, validation: "must be checked", error-message: "You must accept the privacy notice to create an account." }
    submit-behavior: "POST API-001; disable submit while pending; uniform success view regardless of duplicate email"
    security: [csrf-token, rate-limited, captcha-after-3-failures]
  - id: FRM-002
    name: Login Form
    used-in: [WF-002, PG-002]
    fields:
      - { name: email,    label: "Email address", type: email,    required: true, validation: "RFC 5322", error-message: "Enter a valid email address.", accessibility: "autocomplete=email" }
      - { name: password, label: "Password",      type: password, required: true, validation: "non-empty, max 256", error-message: "Enter your password.", accessibility: "autocomplete=current-password; show/hide toggle with aria-pressed" }
    submit-behavior: "POST API-002; on 401 show single generic error above the form; never field-level hints"
    security: [csrf-token, rate-limited, captcha-after-3-failures]

# ------------------------------------------------------------------ 15. PAGES
pages:
  - { id: PG-001, name: Registration,    route: /register,       access: [ROLE-ANONYMOUS], states: [default, submitting, success-check-email, error], components: [FRM-001, privacy-notice-link], navigation: { entry-points: [landing-header, /login], exit-points: [/login, /verify-email] } }
  - { id: PG-002, name: Login,           route: /login,          access: [ROLE-ANONYMOUS], states: [default, submitting, error, locked-generic], components: [FRM-002, forgot-password-link], navigation: { entry-points: [landing-header, redirect-after-401], exit-points: [/dashboard, /register, /reset-password] } }
  - { id: PG-003, name: Verify Email,    route: /verify-email,   access: [ROLE-ANONYMOUS], states: [verifying, success, expired-resend, invalid], components: [verification-status, resend-button], navigation: { entry-points: [email-link], exit-points: [/login] } }
  - { id: PG-004, name: Reset Password,  route: /reset-password, access: [ROLE-ANONYMOUS], states: [request, email-sent, set-new-password, success, token-invalid], components: [reset-request-form, new-password-form], navigation: { entry-points: [/login], exit-points: [/login] } }

# -------------------------------------------------------------------- 16. API
api:
  - id: API-001
    method: POST
    path: /auth/register
    description: Create a new account in PENDING_VERIFICATION and dispatch verification email.
    auth-required: false
    roles: [ROLE-ANONYMOUS]
    request: { content-type: application/json, schema: "{email, password, consent}", validation: "FRM-001 rules server-side; idempotency key = normalized email" }
    responses:
      - { status: 202, condition: "accepted (uniform for new and duplicate email)", schema: "{message}" }
      - { status: 400, condition: "validation or password-policy failure", schema: "{errors[]}" }
      - { status: 429, condition: "rate limited", schema: "{message, retryAfter}" }
    rate-limit: "10/min per IP"
    idempotency: "duplicate submits for same email return identical 202"
    errors: [ERR-VALIDATION, ERR-RATE-LIMITED]
  - id: API-002
    method: POST
    path: /auth/login
    description: Verify credentials and issue access JWT + rotating refresh cookie.
    auth-required: false
    roles: [ROLE-ANONYMOUS]
    request: { content-type: application/json, schema: "{email, password}", validation: "constant-time verification; lockout + rate-limit pre-checks" }
    responses:
      - { status: 200, condition: "credentials valid and account ACTIVE", schema: "{accessToken, expiresIn}; Set-Cookie refresh" }
      - { status: 401, condition: "invalid credentials, locked, or unverified (uniform)", schema: "{message}" }
      - { status: 429, condition: "rate limited", schema: "{message, retryAfter}" }
    rate-limit: "10/min per IP + 20/hour per account"
    idempotency: "naturally idempotent; each success rotates session"
    errors: [ERR-AUTH-GENERIC, ERR-RATE-LIMITED]
  - id: API-003
    method: POST
    path: /auth/refresh
    description: Rotate refresh token and mint a new access JWT; replay revokes session family.
    auth-required: true
    roles: [ROLE-USER]
    request: { content-type: application/json, schema: "{} (refresh cookie)", validation: "cookie present, unexpired, hash matches current family head" }
    responses:
      - { status: 200, condition: "rotation succeeded", schema: "{accessToken, expiresIn}; Set-Cookie new refresh" }
      - { status: 401, condition: "missing/expired/replayed token (family revoked on replay, AUD-006)", schema: "{message}" }
    rate-limit: "60/hour per session"
    idempotency: "non-idempotent by design (rotation); replay is the abuse signal"
    errors: [ERR-AUTH-GENERIC]
  - id: API-004
    method: POST
    path: /auth/password-reset
    description: Request reset link (uniform response) or complete reset with token.
    auth-required: false
    roles: [ROLE-ANONYMOUS]
    request: { content-type: application/json, schema: "{email} | {token, newPassword}", validation: "phase inferred from payload; token single-use, 30 min TTL" }
    responses:
      - { status: 202, condition: "reset request accepted (uniform)", schema: "{message}" }
      - { status: 200, condition: "password updated; all sessions revoked", schema: "{message}" }
      - { status: 400, condition: "invalid/expired/used token or policy failure", schema: "{errors[]}" }
      - { status: 429, condition: "rate limited", schema: "{message, retryAfter}" }
    rate-limit: "5/hour per email + 10/min per IP"
    idempotency: "request phase idempotent per email; completion single-use by token"
    errors: [ERR-VALIDATION, ERR-TOKEN-INVALID, ERR-RATE-LIMITED]

# ------------------------------------------------------------------ 17. EVENTS
events:
  - { id: EVT-auth.user.registered,     name: auth.user.registered,     producer: auth-service, consumers: [analytics-pipeline, crm-sync],        payload: { user-id: uuid, registered-at: timestamp, consent-version: string }, delivery: at-least-once, pii-in-payload: false }
  - { id: EVT-auth.user.verified,       name: auth.user.verified,       producer: auth-service, consumers: [analytics-pipeline, onboarding-service], payload: { user-id: uuid, verified-at: timestamp }, delivery: at-least-once, pii-in-payload: false }
  - { id: EVT-auth.session.anomalous,   name: auth.session.anomalous,   producer: auth-service, consumers: [fraud-dashboard, siem],               payload: { user-id: uuid, risk-score: number, signals: list }, delivery: at-least-once, pii-in-payload: false }

# ------------------------------------------------------------ 18. INTEGRATIONS
integrations:
  - { id: INT-001, system: "Transactional email provider", purpose: "verification, reset, and security emails", protocol: "HTTPS REST + webhooks for delivery receipts", direction: outbound, auth: "API key in secret store, 90-day rotation", failure-mode: "queue with retry + DLQ; ALT-002 on sustained failure; auth flows never block on email", data-shared: [recipient-email, template-id, locale, deep-link-token] }
  - { id: INT-002, system: "Breached-password corpus (k-anonymity API)", purpose: "reject compromised passwords (REQ-010)", protocol: "HTTPS range query (hash prefix only)", direction: outbound, auth: "none (public k-anonymity endpoint)", failure-mode: "fail-open with warn log + risk flag; policy checks other than breach still enforced", data-shared: [sha1-prefix-5-chars-only] }

# ---------------------------------------------------------------- 19. TESTING
testing:
  strategy: "Test pyramid: unit (policy, hashing, token logic) > integration (API + datastore + email stub) > e2e (browser flows). Security tests run in CI on every PR; load test before each release."
  coverage-targets: { unit: "90% on auth-service core", integration: "all 4 API endpoints x all documented responses", e2e: "WF-001, WF-002, WF-003 happy + primary failure paths" }
  golden-scenarios:
    - { id: GS-001, name: Registration happy path,  given: "a visitor with a unique email and policy-compliant password", when: "they register and click the emailed link within 24h", then: "account is ACTIVE and login succeeds", requirement: REQ-001 }
    - { id: GS-002, name: Login happy path,         given: "a verified ACTIVE user", when: "they submit correct credentials", then: "200 with access JWT + refresh cookie, AUD-003 recorded, p95 < 2s", requirement: REQ-002 }
    - { id: GS-003, name: Lockout engages,          given: "5 failed logins for one account within 15 minutes", when: "a 6th attempt arrives", then: "account locks 30 min, NOT-003 sent, AUD-007 recorded, response stays generic 401", requirement: REQ-011 }
    - { id: GS-004, name: Refresh replay revokes,   given: "a refresh token already used once", when: "it is presented again", then: "401, entire session family revoked, AUD-006 recorded", requirement: REQ-018 }
    - { id: GS-005, name: No account enumeration,   given: "one registered and one unknown email", when: "each is used on register, login, and reset-request", then: "responses are byte-identical in shape and constant-time (±50ms)", requirement: REQ-001 }
  security-tests: [sql-injection-on-all-auth-inputs, xss-in-device-label, csrf-on-all-state-changing-endpoints, session-fixation, jwt-alg-none-rejection, timing-attack-on-login, rate-limit-bypass-via-header-spoofing]
  performance-tests: [login-2s-p95-at-500rps, registration-burst-100rps-sustained-5min, refresh-storm-after-mass-revocation]

# -------------------------------------------------------------- 20. DEPLOYMENT
deployment:
  environments: [dev, staging, production]
  pipeline: [lint, unit-tests, integration-tests, security-scan, build, deploy-staging, e2e-on-staging, manual-gate, deploy-production]
  rollout: canary
  rollback: "automatic on ALT-001 firing during canary window; otherwise one-click revert to previous image; DB migrations are expand-contract (never breaking)"
  feature-flags: [anomaly-notification-enabled, captcha-after-failures, breach-check-enabled]
  configuration: [DATABASE_URL, SESSION_SIGNING_KEY, EMAIL_PROVIDER_API_KEY, RATE_LIMIT_REDIS_URL, BREACH_API_BASE_URL]

# -------------------------------------------------------------- 21. OPERATIONS
operations:
  runbooks:
    - { id: RB-001, scenario: "Login success-rate below SLO (ALT-001/ALT-003)", steps: ["check auth-overview dashboard for failing step", "inspect rate-limit and lockout counters for attack signature", "if attack: enable captcha-after-failures flag and tighten per-IP limits", "if infra: check session store and DB latency; scale per capacity plan", "post incident note in #auth-ops"], owner: sre-lead }
    - { id: RB-002, scenario: "Verification/reset emails failing (ALT-002)", steps: ["check INT-001 provider status page", "inspect DLQ depth", "fail over to secondary template-compatible provider if outage > 30 min", "replay DLQ after recovery"], owner: sre-lead }
    - { id: RB-003, scenario: "GDPR erasure request received", steps: ["verify requester identity via support flow", "execute erasure job (purges ENT-User PII + sessions + tokens)", "confirm backup purge within 30-day window", "record completion in audit trail"], owner: support-lead }
  capacity: { expected-load: "50 logins/sec steady, 5 registrations/sec", peak-load: "500 logins/sec (marketing events)", scaling-strategy: "horizontal auto-scale on CPU+latency; session store sized for 10x steady state" }
  maintenance: [weekly-dependency-patching, monthly-secret-rotation-check, quarterly-lockout-threshold-review-against-attack-data]
  on-call: "platform on-call rota; auth-service pages route to backend-oncall with security-officer escalation for fraud signals"

# ------------------------------------------------------------------ 22. SUPPORT
support:
  tiers: [self-service-help-center, tier-1-support, tier-2-auth-team, security-escalation]
  escalation: "tier-1 -> tier-2 within 4 business hours; suspected-compromise -> security-officer immediately (24/7)"
  common-issues:
    - { issue: "Verification email not received", resolution: "check spam guidance; resend from /verify-email; tier-1 can trigger manual resend", kb-ref: KB-AUTH-001 }
    - { issue: "Account locked", resolution: "wait 30 minutes or tier-2 unlock after identity verification; never unlock on the first contact without verification", kb-ref: KB-AUTH-002 }
    - { issue: "Password reset link expired", resolution: "request a new link; links live 30 minutes by design", kb-ref: KB-AUTH-003 }
  user-impact-comms: "status page entry + in-app banner for auth incidents > 10 min; templated comms owned by support-lead"

# ------------------------------------------------------------ 23. DOCUMENTATION
documentation:
  - { type: user-guide,     audience: "end users",        owner: product-design,    location: help-center/auth/,             update-trigger: "any UX or policy change visible to users" }
  - { type: api-reference,  audience: "client developers", owner: auth-service-team, location: docs/api/auth.md,              update-trigger: "any API contract change (CI-enforced)" }
  - { type: runbook,        audience: "on-call engineers", owner: sre-lead,          location: operations.runbooks,           update-trigger: "every incident post-mortem" }
  - { type: architecture,   audience: "engineers",         owner: architect,         location: docs/architecture/auth.md,     update-trigger: "any ADR affecting auth" }
  - { type: onboarding,     audience: "new team members",  owner: auth-service-team, location: docs/onboarding/auth.md,       update-trigger: "quarterly review" }

# -------------------------------------------------------------- 24. KNOWLEDGE
knowledge:
  glossary:
    - { term: session family, definition: "All refresh tokens descending from one login; revoked as a unit on replay detection." }
    - { term: account enumeration, definition: "Inferring whether an email is registered from response differences; prevented by uniform responses." }
    - { term: expand-contract migration, definition: "Two-phase schema change that keeps old and new code compatible during rollout." }
  domain-concepts: [credential-stuffing, k-anonymity breach lookup, constant-time comparison, token rotation]
  references: ["NIST SP 800-63B (password policy)", "OWASP ASVS v4 §2-3 (auth & session)", "GDPR Art. 5/6/17", "SOC2 CC6 (logical access)"]

# ------------------------------------------------------------------ 25. RISKS
risks:
  - { id: RSK-001, description: "Credential-stuffing campaign overwhelms lockout/rate-limit tuning", category: security,    likelihood: high,   impact: high,     mitigation: "layered controls (REQ-010..012, REQ-015) + captcha flag + RB-001", owner: security-officer }
  - { id: RSK-002, description: "Email deliverability issues block registrations and resets",         category: operational, likelihood: medium, impact: high,     mitigation: "retry queue + DLQ + secondary provider failover (RB-002)", owner: sre-lead }
  - { id: RSK-003, description: "Audit/monitoring gaps discovered during SOC2 audit",                 category: compliance,  likelihood: low,    impact: critical, mitigation: "audit event catalog reviewed at G4; quarterly evidence dry-run", owner: security-officer }
  - { id: RSK-004, description: "PII retained in backups beyond GDPR erasure deadline",               category: compliance,  likelihood: medium, impact: high,     mitigation: "30-day backup purge cycle aligned to erasure SLA (RB-003)", owner: data-protection-officer }

# ------------------------------------------------------------- 26. ASSUMPTIONS
assumptions:
  - { id: ASM-001, statement: "Email + password is the only authentication method for launch", impact-if-wrong: "OAuth/social providers require new flows, consent screens, and account-linking design", validation-needed: "Confirm with product-owner: are social logins required for v1?" }
  - { id: ASM-002, statement: "GDPR applies (EU users are in scope)",                            impact-if-wrong: "consent capture and erasure flows could be simplified; retention values change", validation-needed: "Confirm target markets with legal." }
  - { id: ASM-003, statement: "No enterprise SSO/SAML tenants at launch",                        impact-if-wrong: "identity architecture needs federation layer before GA", validation-needed: "Confirm sales pipeline has no enterprise commitments." }
  - { id: ASM-004, statement: "MFA is policy-ready but UI is deferred post-launch",              impact-if-wrong: "launch scope grows by enrollment + recovery-codes flows", validation-needed: "Confirm risk appetite with security-officer." }
  - { id: ASM-005, statement: "Expected peak of 500 logins/sec covers marketing events",          impact-if-wrong: "capacity plan and rate-limit thresholds need retuning", validation-needed: "Validate against marketing launch forecasts." }
  - { id: ASM-006, statement: "7-year audit retention satisfies all applicable jurisdictions",    impact-if-wrong: "retention and storage costs change; possible legal exposure", validation-needed: "Confirm retention schedule with legal/compliance." }

# -------------------------------------------------------------- 27. GOVERNANCE
governance:
  approvals:
    - { gate: G1-requirements, approver-role: product-owner,    status: pending }
    - { gate: G2-architecture, approver-role: architect,        status: pending }
    - { gate: G3-data-model,   approver-role: architect,        status: pending }
    - { gate: G4-security,     approver-role: security-officer, status: pending }
  lifecycle: draft
  version: 1.0.0
  change-policy: "changes to must-priority requirements or security section reopen the affected gate; all changes via PR with trace update"
  traceability: "every hidden requirement and cross-cutting domain cites discovery/<domain>/<rule-id>; explicit items cite the verbatim story; workflows reference requirement ids; audit/notification/runbook ids cross-link"

# -------------------------------------------------------------- 28. COMPLIANCE
compliance:
  regulations:
    - { name: GDPR,    applicable: true,  rationale: "EU users assumed in scope (ASM-002); PII processed (email, IP, device labels)", obligations: [lawful-basis-and-consent-capture, privacy-notice-versioning, data-subject-rights-support, 30-day-erasure-including-backups, breach-notification-72h] }
    - { name: SOC2,    applicable: true,  rationale: "B2B customers expected to request SOC2 Type II reports", obligations: [logical-access-controls-CC6, audit-trail-retention, change-management-evidence, incident-response-runbooks] }
    - { name: HIPAA,   applicable: false, rationale: "no health data processed by this feature" }
    - { name: PCI-DSS, applicable: false, rationale: "no cardholder data; payments out of scope" }
  privacy:
    pii-inventory: [ENT-User.email, ENT-Session.ip, ENT-Session.device_label]
    consent: "explicit checkbox at registration; consent version + timestamp stored on ENT-User; re-consent on material privacy-notice changes"
    data-subject-rights: [access, rectification, erasure, portability]
  backup:
    strategy: "automated daily snapshots + continuous WAL archiving; encrypted at rest; cross-region copy"
    rpo: "5 minutes"
    rto: "1 hour"
  disaster-recovery:
    plan: "warm standby in secondary region; DNS failover; session store rebuilt from durable refresh-hash table (users transparently re-authenticate at worst)"
    test-frequency: "twice yearly game-day, including restore-from-backup drill"
